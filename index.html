<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CIC TV — Canales en Vivo</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;--accent:#e63f6e;--text:#f0f0f8;--text2:#9090b0;--border:rgba(255,255,255,0.07);--radius:12px;--sidebar:220px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* HEADER */
header{flex-shrink:0;height:52px;background:rgba(10,10,15,0.98);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 14px;z-index:50}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:-0.5px;flex-shrink:0}
.logo span{color:var(--accent)}
.sw{flex:1;position:relative}
.sw svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;width:14px;height:14px}
#search{width:100%;padding:7px 11px 7px 34px;background:var(--bg3);border:1px solid var(--border);border-radius:24px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
#search:focus{border-color:rgba(230,63,110,0.5)}
#search::placeholder{color:var(--text2)}

/* LAYOUT */
.layout{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
aside{width:var(--sidebar);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
.sl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);padding:10px 10px 4px}
.cb{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;text-align:left;width:100%}
.cb:hover{background:var(--bg3);color:var(--text)}
.cb.active{background:rgba(230,63,110,0.15);color:var(--accent)}
.cb .ic{font-size:14px;width:18px;text-align:center}
.cb .ct{margin-left:auto;font-size:10px;background:var(--bg4);color:var(--text2);padding:1px 6px;border-radius:8px}
.cb.active .ct{background:rgba(230,63,110,0.2);color:var(--accent)}

/* MAIN */
main{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column}

/* PLAYER - PRIORITARIO */
.player-wrap{flex-shrink:0;background:#000;position:relative;width:100%;min-height:210px}
.player-wrap.theater{aspect-ratio:16/9;max-height:45vh;min-height:200px}
#vp{width:100%;height:100%;min-height:200px;display:block;background:#000;object-fit:contain}

/* PLACEHOLDER */
.pp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#000;color:var(--text2);cursor:default;pointer-events:none}
.pp .bi{font-size:48px;opacity:.2}
.pp p{font-size:13px;opacity:.5}
.pp.hidden{display:none}

/* PLAYER OVERLAY INFO */
.pbar{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:linear-gradient(transparent,rgba(0,0,0,0.9));display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .2s}
.player-wrap:hover .pbar,.player-wrap.show-bar .pbar{opacity:1}
.live{background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px}
.pname{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pctrls{display:flex;gap:5px}
.pcb{background:rgba(255,255,255,0.15);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.pcb:hover{background:rgba(255,255,255,0.3)}

/* LOADING */
.ld{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);pointer-events:none}
.ld.show{display:flex}
.sp{width:32px;height:32px;border-radius:50%;border:3px solid var(--bg4);border-top-color:var(--accent);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
.er{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(0,0,0,0.9);color:var(--text2);font-size:13px;text-align:center;padding:20px}
.er.show{display:flex}
.er strong{color:var(--text);font-size:14px}
.er .ebtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.er button{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500}
.er .retry{background:var(--accent);color:#fff}
.er .skip{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* FULLSCREEN */
.player-wrap:-webkit-full-screen{width:100vw;height:100vh;max-height:none;aspect-ratio:unset}
.player-wrap:fullscreen{width:100vw;height:100vh;max-height:none;aspect-ratio:unset}
.player-wrap:-webkit-full-screen #vp{height:100vh}
.player-wrap:fullscreen #vp{height:100vh}

/* FILTROS */
.filters{flex-shrink:0;padding:8px 14px;border-bottom:1px solid var(--border)}
.fbar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.fbar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:4px 12px;border-radius:16px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* CANALES */
.ch-header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px}
.ch-header h2{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.ch-header span{font-size:11px;color:var(--text2)}

.grid{padding:0 10px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .18s;position:relative}
.card:hover{border-color:rgba(230,63,110,0.4);transform:translateY(-2px)}
.card:active{transform:scale(0.97)}
.card.playing{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.clogo{aspect-ratio:16/9;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.clogo img{max-width:75%;max-height:65%;object-fit:contain}
.clogo .fb{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text2);text-align:center}
.ldot{position:absolute;top:4px;left:4px;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.cinfo{padding:6px 8px}
.cname{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ccat{font-size:9px;color:var(--text2);margin-top:1px}
.fb-btn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.7);border:none;width:22px;height:22px;border-radius:4px;color:var(--text2);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.card:hover .fb-btn,.fb-btn.active{opacity:1}
.fb-btn.active{color:#ffcc00}

.empty{text-align:center;padding:40px 20px;color:var(--text2);grid-column:1/-1}
.empty .bi{font-size:40px;opacity:.2;margin-bottom:8px}

/* TOAST */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:20px;font-size:12px;z-index:999;transition:transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* AD */
.ad{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 14px;text-align:center;color:var(--text2);font-size:11px;min-height:52px;display:flex;align-items:center;justify-content:center}

/* MOBILE */
@media(max-width:700px){
  :root{--sidebar:0px}
  aside{display:none}
  .player-wrap.theater{height:220px !important;max-height:220px;min-height:220px;aspect-ratio:unset}
  .grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
}
</style>
</head>

<script>
// ── CANALES VERIFICADOS ──

const CHANNELS = [

  // DEPORTES
  {id:'d01',name:'Outside TV',      cat:'Deportes',     co:'US', logo:'',
   url:'https://rakuten-outsidetv-1-us.samsung.wurl.tv/manifest/playlist.m3u8'},
  {id:'d02',name:'Fight Sports',    cat:'Deportes',     co:'US', logo:'',
   url:'https://rakuten-fightsports-1-us.samsung.wurl.tv/manifest/playlist.m3u8'},
  {id:'d03',name:'Motor Trend',     cat:'Deportes',     co:'US', logo:'',
   url:'https://rakuten-motortrend-1-us.samsung.wurl.tv/manifest/playlist.m3u8'},
  {id:'d04',name:'Red Bull TV',     cat:'Deportes',     co:'AT', logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Red_Bull_logo.svg/120px-Red_Bull_logo.svg.png',
   url:'https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master.m3u8'},

  {id:'e03',name:'Comedy Dynamics', cat:'Entretenimiento',co:'US',logo:'',

  // MÚSICA
  {id:'m01',name:'Mezzo Live HD',   cat:'Música',       co:'FR', logo:'',
   url:'https://d1zx6l1dn8vaj5.cloudfront.net/out/v1/6c8e8aad908143d9b11caf43a23e0f61/index.m3u8'},
  {id:'m02',name:'Stingray Classica',cat:'Música',      co:'CA', logo:'',

  // INFANTIL
  {id:'k01',name:'Baby TV',         cat:'Infantil',     co:'GB', logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ed/BabyTV.svg/120px-BabyTV.svg.png',
   url:'https://d1zx6l1dn8vaj5.cloudfront.net/out/v1/babytv/index.m3u8'},
  {id:'k02',name:'Kidstream',       cat:'Infantil',     co:'US', logo:'',

  {id:'dc01',name:'History Hit',    cat:'Documentales', co:'GB', logo:'',

  {id:'dc03',name:'Fremantle Docs', cat:'Documentales', co:'US', logo:'',

  // RELIGIOSOS
  {id:'r01',name:'3ABN Latino',     cat:'Religiosos',   co:'US', logo:'',

];

// ── ESTADO ──
let allCh = [...CHANNELS];
let filtered = [];
let favs = JSON.parse(localStorage.getItem('cicFavs')||'[]');
let curCat = 'all';
let curCountry = 'all';
let curSearch = '';
let curCh = null;
let curIdx = -1;
let hlsObj = null;
let errTimer = null;

// ── INIT ──
updateCounters();
doFilter();
showToast('✓ ' + allCh.length + ' canales listos');

// Intentar cargar más en segundo plano
setTimeout(loadExtra, 2000);

async function loadExtra() {
  const proxies = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
  ];
  const src = 'https://iptv-org.github.io/iptv/languages/spa.m3u';
  for (const px of proxies) {
    try {
      const r = await fetch(px + encodeURIComponent(src), {signal: AbortSignal.timeout(7000)});
      if (!r.ok) continue;
      const txt = await r.text();
      const parsed = parseM3U(txt);
      const newCh = parsed.filter(c => !allCh.find(x => x.url === c.url));
      if (newCh.length > 0) {
        allCh = [...allCh, ...newCh];
        updateCounters();
        doFilter();
        showToast('✓ +' + newCh.length + ' canales en español');
      }
      break;
    } catch(e) { continue; }
  }
}

function parseM3U(txt) {
  const CM = {news:'Noticias',sports:'Deportes',entertainment:'Entretenimiento',movies:'Películas',kids:'Infantil',music:'Música',documentary:'Documentales',religious:'Religiosos',general:'General',undefined:'General',auto:'General',comedy:'Entretenimiento',animation:'Infantil',family:'Infantil',series:'Entretenimiento',classic:'Entretenimiento',culture:'Entretenimiento'};
  const lines = txt.split('\n');
  const res = [];
  let cur = {};
  for (let l of lines) {
    l = l.trim();
    if (l.startsWith('#EXTINF')) {
      cur = {name: l.split(',').pop().trim()};
      const lg = l.match(/tvg-logo="([^"]*)"/); cur.logo = lg?lg[1]:'';
      const ct = l.match(/group-title="([^"]*)"/); cur.cat = CM[(ct?ct[1]:'').toLowerCase()] || 'General';
      const co = l.match(/tvg-country="([^"]*)"/); cur.co = co?co[1].toUpperCase():'';
    } else if (l && !l.startsWith('#') && cur.name) {
      cur.url = l;
      cur.id = 'e' + Math.random().toString(36).slice(2,9);
      res.push({...cur}); cur = {};
    }
  }
  return res;
}

function updateCounters() {
  const cats = ['Noticias','Deportes','Entretenimiento','Películas','Infantil','Música','Documentales','Religiosos','General'];
  const el = id => document.getElementById(id);
  el('cn-all').textContent = allCh.length;
  el('cn-fav').textContent = favs.length;
  cats.forEach(c => { const e = el('cn-'+c); if(e) e.textContent = allCh.filter(ch=>ch.cat===c).length; });
  // países
  const countries = [...new Set(allCh.map(c=>c.co).filter(Boolean))].sort();
  const bar = el('fbar');
  bar.innerHTML = '';
  const ab = document.createElement('button');
  ab.className = 'chip' + (curCountry==='all'?' active':'');
  ab.textContent = '🌐 Todos';
  ab.onclick = () => setCountry('all', ab);
  bar.appendChild(ab);
  countries.slice(0,25).forEach(co => {
    const b = document.createElement('button');
    b.className = 'chip' + (curCountry===co?' active':'');
    b.textContent = co;
    b.onclick = () => setCountry(co, b);
    bar.appendChild(b);
  });
}

function setCat(cat, btn) {
  curCat = cat;
  document.querySelectorAll('.cb').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  doFilter();
}

function setCountry(co, btn) {
  curCountry = co;
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  doFilter();
}

function doFilter() {
  curSearch = document.getElementById('search').value.toLowerCase();
  let list = allCh;
  if (curCat==='favoritos') list = list.filter(c => favs.includes(c.id));
  else if (curCat!=='all') list = list.filter(c => c.cat===curCat);
  if (curCountry!=='all') list = list.filter(c => c.co===curCountry);
  if (curSearch) list = list.filter(c => c.name.toLowerCase().includes(curSearch));
  filtered = list;
  renderGrid();
  const titles = {all:'Todos los canales', favoritos:'⭐ Favoritos'};
  document.getElementById('stitle').textContent = titles[curCat] || curCat;
  document.getElementById('scnt').textContent = filtered.length + ' canales';
}

function renderGrid() {
  const g = document.getElementById('grid');
  if (!filtered.length) {
    g.innerHTML = '<div class="empty"><div class="bi">📭</div><p>Sin canales</p></div>';
    return;
  }
  g.innerHTML = filtered.slice(0,300).map(ch => {
    const isFav = favs.includes(ch.id);
    const isPlay = curCh && curCh.id===ch.id;
    return `<div class="card${isPlay?' playing':''}" onclick="play('${ch.id}')" id="cd-${ch.id}">
      <div class="clogo">
        ${ch.logo
          ? `<img src="${ch.logo}" alt="${ch.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div class="fb" style="display:none">${ch.name.slice(0,3).toUpperCase()}</div>`
          : `<div class="fb">${ch.name.slice(0,3).toUpperCase()}</div>`}
        <div class="ldot"></div>
      </div>
      <div class="cinfo">
        <div class="cname" title="${ch.name}">${ch.name}</div>
        <div class="ccat">${ch.cat}${ch.co?' · '+ch.co:''}</div>
      </div>
      <button class="fb-btn${isFav?' active':''}" onclick="toggleFav(event,'${ch.id}')">${isFav?'⭐':'☆'}</button>
    </div>`;
  }).join('');
}

// ── PLAYER — lógica mejorada ──
function play(id) {
  const ch = allCh.find(c => c.id===id);
  if (!ch) return;
  curCh = ch;
  curIdx = filtered.findIndex(c => c.id===id);

  // UI
  document.getElementById('pp').classList.add('hidden');
  document.getElementById('er').classList.remove('show');
  document.getElementById('ld').classList.add('show');
  document.getElementById('pname').textContent = ch.name;
  document.getElementById('pw').classList.add('show-bar');
  setTimeout(() => document.getElementById('pw').classList.remove('show-bar'), 3000);

  // Marcar card activa
  document.querySelectorAll('.card').forEach(c => c.classList.remove('playing'));
  const cd = document.getElementById('cd-'+id);
  if (cd) { cd.classList.add('playing'); cd.scrollIntoView({behavior:'smooth', block:'nearest'}); }

  // Timeout de error — si en 15s no carga, error
  clearTimeout(errTimer);
  errTimer = setTimeout(() => {
    if (document.getElementById('ld').classList.contains('show')) showErr();
  }, 15000);

  const v = document.getElementById('vp');

  // Destruir HLS anterior
  if (hlsObj) { hlsObj.destroy(); hlsObj = null; }
  v.src = '';
  v.load();

  const url = ch.url;

  // Intentar con HLS.js primero (mejor compatibilidad)
  if (Hls.isSupported()) {
    hlsObj = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      startLevel: -1, // auto quality
      xhrSetup: function(xhr) {
        xhr.withCredentials = false;
      }
    });
    hlsObj.loadSource(url);
    hlsObj.attachMedia(v);
    hlsObj.on(Hls.Events.MANIFEST_PARSED, () => {
      clearTimeout(errTimer);
      document.getElementById('ld').classList.remove('show');
      v.play().catch(() => {
        // Autoplay bloqueado en móvil — mostrar botón play nativo
        document.getElementById('ld').classList.remove('show');
      });
    });
    hlsObj.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        // Intentar fallback nativo
        tryNative(v, url);
      }
    });
  } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari / iOS — soporte nativo HLS
    tryNative(v, url);
  } else {
    tryNative(v, url);
  }
}

function tryNative(v, url) {
  clearTimeout(errTimer);
  v.src = url;
  v.load();
  const playPromise = v.play();
  if (playPromise !== undefined) {
    playPromise
      .then(() => document.getElementById('ld').classList.remove('show'))
      .catch(() => {
        // Autoplay bloqueado — dejar controles nativos visibles
        document.getElementById('ld').classList.remove('show');
      });
  }
  errTimer = setTimeout(() => {
    if (v.readyState < 2) showErr();
  }, 12000);
}

v.oncanplay = () => { clearTimeout(errTimer); document.getElementById('ld').classList.remove('show'); };
v.onplaying = () => { clearTimeout(errTimer); document.getElementById('ld').classList.remove('show'); };
v.onerror = () => showErr();
v.onstalled = () => { /* no hacer nada, puede recuperarse */ };

function showErr() {
  clearTimeout(errTimer);
  document.getElementById('ld').classList.remove('show');
  document.getElementById('er').classList.add('show');
}

function retry() {
  if (curCh) play(curCh.id);
}

function nextChannel() {
  if (filtered.length === 0) return;
  const next = filtered[(curIdx + 1) % filtered.length];
  play(next.id);
}

function goFS() {
  const el = document.getElementById('pw');
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  } else {
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  }
}

function toggleFav(e, id) {
  e.stopPropagation();
  const i = favs.indexOf(id);
  if (i===-1) { favs.push(id); showToast('⭐ Favorito agregado'); }
  else { favs.splice(i,1); showToast('Eliminado de favoritos'); }
  localStorage.setItem('cicFavs', JSON.stringify(favs));
  updateCounters();
  const btn = document.querySelector('#cd-'+id+' .fb-btn');
  if (btn) { btn.classList.toggle('active', favs.includes(id)); btn.textContent = favs.includes(id)?'⭐':'☆'; }
  if (curCat==='favoritos') doFilter();
}

let tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(tt);
  tt = setTimeout(() => t.classList.remove('show'), 2500);
}

// Referencia al video para eventos
const v = document.getElementById('vp');
v.addEventListener('canplay', () => { clearTimeout(errTimer); document.getElementById('ld').classList.remove('show'); });
v.addEventListener('playing', () => { clearTimeout(errTimer); document.getElementById('ld').classList.remove('show'); });
v.addEventListener('error', () => showErr());

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/CIC-TV/sw.js').catch(()=>{});
</script>
