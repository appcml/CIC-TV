<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CIC TV тАФ Canales en Vivo</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
  --accent:#e63f6e;--accent2:#ff9900;
  --text:#f0f0f8;--text2:#9090b0;
  --border:rgba(255,255,255,0.07);--radius:12px;--sidebar:210px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* тФАтФА HEADER тФАтФА */
header{position:sticky;top:0;z-index:200;height:52px;background:rgba(10,10,15,0.98);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 12px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:-0.5px;flex-shrink:0}
.logo span{color:var(--accent)}
.sw{flex:1;position:relative;max-width:500px}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;width:13px;height:13px}
#search{width:100%;padding:7px 10px 7px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:24px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
#search:focus{border-color:rgba(230,63,110,0.5)}
#search::placeholder{color:var(--text2)}
.hbts{margin-left:auto;display:flex;gap:5px;flex-shrink:0}
.hbt{padding:5px 11px;border-radius:16px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.hbt:hover{background:var(--bg4);color:var(--text)}
.hbt.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.hbt.ron{background:var(--accent2);color:#000;border-color:var(--accent2)}

/* тФАтФА LAYOUT тФАтФА */
.layout{display:flex;min-height:calc(100vh - 52px)}

/* тФАтФА SIDEBAR CATEGOR├НAS тФАтФА */
aside{width:var(--sidebar);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:10px 8px;position:sticky;top:52px;height:calc(100vh - 52px)}
.sl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);padding:10px 10px 4px}
.cb{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;text-align:left;width:100%;white-space:nowrap}
.cb:hover{background:var(--bg3);color:var(--text)}
.cb.active{background:rgba(230,63,110,0.15);color:var(--accent)}
.cb.ron{background:rgba(255,153,0,0.15);color:var(--accent2)}
.cb .ic{font-size:13px;width:16px;text-align:center}
.cb .ct{margin-left:auto;font-size:10px;background:var(--bg4);color:var(--text2);padding:1px 5px;border-radius:6px;min-width:20px;text-align:center}
.cb.active .ct{background:rgba(230,63,110,0.2);color:var(--accent)}

/* тФАтФА MAIN CONTENT тФАтФА */
main{flex:1;overflow-x:hidden;display:flex;flex-direction:column;min-width:0}

/* тФАтФА ZONA SUPERIOR: PLAYER + LISTA LATERAL тФАтФА */
.top-zone{display:flex;gap:0;border-bottom:2px solid var(--border)}

/* PLAYER */
.player-col{flex:1;min-width:0;display:flex;flex-direction:column;background:#000}
.video-ratio{position:relative;width:100%;padding-bottom:56.25%;height:0;overflow:hidden;background:#000}
.video-ratio video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;border:none}
.pp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#000;color:var(--text2);z-index:2}
.pp .bi{font-size:40px;opacity:.2}
.pp p{font-size:12px;opacity:.4}
.pp.hide{display:none}
.ld{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);z-index:4}
.ld.show{display:flex}
.sp{width:28px;height:28px;border-radius:50%;border:3px solid var(--bg4);border-top-color:var(--accent);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.er{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:7px;background:rgba(0,0,0,0.9);color:var(--text2);font-size:12px;text-align:center;padding:16px;z-index:4}
.er.show{display:flex}
.er strong{color:var(--text);font-size:13px}
.ebtns{display:flex;gap:6px;margin-top:4px}
.ebtns button{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:500}
.retry{background:var(--accent);color:#fff}
.skip{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* AUDIO */
.audio-bar{display:none;align-items:center;gap:10px;padding:14px;background:var(--bg2);min-height:80px}
.audio-bar.show{display:flex}
.audio-bar .aic{font-size:32px}
.audio-info{flex:1}
.audio-info .an{font-weight:600;font-size:14px}
.audio-info .ac{font-size:11px;color:var(--text2);margin-top:2px}
audio{flex:1;height:36px;accent-color:var(--accent2)}

/* BARRA PLAYER */
.pbar{background:var(--bg2);border-top:1px solid var(--border);padding:6px 10px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.live-b{background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px;flex-shrink:0}
.radio-b{background:var(--accent2);color:#000;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px;flex-shrink:0}
.pn{font-size:12px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbts{display:flex;gap:4px}
.pbt{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pbt:hover{background:var(--bg4);color:var(--text)}
.pbt.pin-on{background:rgba(230,63,110,0.2);color:var(--accent);border-color:var(--accent)}

/* тФАтФА LISTA LATERAL DESLIZABLE тФАтФА */
.ch-list-col{
  width:220px;flex-shrink:0;
  background:var(--bg2);border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.ch-list-header{
  padding:8px 10px;border-bottom:1px solid var(--border);
  font-family:'Syne',sans-serif;font-weight:700;font-size:12px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.ch-list-header span{color:var(--text2);font-size:10px;font-weight:400;font-family:'DM Sans',sans-serif}
.ch-list-scroll{flex:1;overflow-y:auto;padding:6px}
.ch-list-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 8px;border-radius:8px;cursor:pointer;
  transition:all .15s;border:1px solid transparent;
  margin-bottom:3px;
}
.ch-list-item:hover{background:var(--bg3);border-color:var(--border)}
.ch-list-item.active{background:rgba(230,63,110,0.12);border-color:var(--accent)}
.ch-list-item.radio-active{background:rgba(255,153,0,0.12);border-color:var(--accent2)}
.ch-list-logo{
  width:36px;height:36px;border-radius:6px;
  background:var(--bg3);object-fit:contain;padding:3px;
  flex-shrink:0;
}
.ch-list-fb{
  width:36px;height:36px;border-radius:6px;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--text2);
  flex-shrink:0;
}
.ch-list-fb.rfb{background:rgba(255,153,0,0.1);color:var(--accent2)}
.ch-list-info{flex:1;min-width:0}
.ch-list-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-list-cat{font-size:9px;color:var(--text2);margin-top:1px}
.ldot-s{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 2s infinite}
.ldot-s.rd{background:var(--accent2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* тФАтФА FILTROS PA├НS тФАтФА */
.fbar-wrap{padding:6px 10px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.fbar{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.fbar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* тФАтФА MODO TABS тФАтФА */
.mode-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.mtab{flex:1;padding:8px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border-bottom:2px solid transparent}
.mtab.active{color:var(--accent);border-bottom-color:var(--accent)}
.mtab.rtab.active{color:var(--accent2);border-bottom-color:var(--accent2)}

/* тФАтФА GRID PRINCIPAL тФАтФА */
.grid-zone{flex:1;overflow-y:auto;padding:0}
.ch-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 4px}
.ch-hd h2{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.ch-hd span{font-size:11px;color:var(--text2)}
.ch-load{text-align:center;padding:16px;color:var(--text2);font-size:12px;display:none}
.ch-load.show{display:block}

.grid{padding:6px 10px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .18s;position:relative}
.card:hover{border-color:rgba(230,63,110,0.4);transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,0.4)}
.card:active{transform:scale(0.97)}
.card.playing{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.card.rplaying{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent2)}
.clogo{width:100%;height:65px;object-fit:contain;background:var(--bg3);padding:5px;display:block}
.cfb{width:100%;height:65px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text2)}
.cfb.rfb{background:rgba(255,153,0,0.08);color:var(--accent2)}
.ldot{position:absolute;top:4px;left:4px;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
.ldot.rd{background:var(--accent2)}
.cinfo{padding:5px 7px}
.cname{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ccat{font-size:9px;color:var(--text2);margin-top:1px}
.favbtn{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.7);border:none;width:20px;height:20px;border-radius:4px;color:var(--text2);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.card:hover .favbtn,.favbtn.on{opacity:1}
.favbtn.on{color:#ffcc00}
.empty{text-align:center;padding:30px;color:var(--text2);grid-column:1/-1}

/* тФАтФА TOAST тФАтФА */
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:18px;font-size:12px;z-index:999;transition:transform .25s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* тФАтФА AD тФАтФА */
.ad{background:var(--bg2);border-top:1px solid var(--border);padding:8px;text-align:center;color:var(--text2);font-size:10px;min-height:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* тФАтФА RESPONSIVE тФАтФА */
@media(max-width:900px){
  .ch-list-col{width:180px}
}
@media(max-width:700px){
  :root{--sidebar:0px}
  aside{display:none}
  .ch-list-col{display:none}
  .grid{grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:5px}
  .hbts .hbt-hide{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo">CIC<span> TV</span></div>
  <div class="sw">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Buscar canal o radio..." oninput="doSearch()">
  </div>
  <div class="hbts">
    <button class="hbt" onclick="showFavs()">тнР Favs</button>
    <button class="hbt hbt-hide on" id="hbt-tv" onclick="setMode('tv')">ЁЯУ║ TV</button>
    <button class="hbt hbt-hide" id="hbt-radio" onclick="setMode('radio')">ЁЯУ╗ Radio</button>
    <button class="hbt hbt-hide" onclick="refreshAll()">тЖ╗</button>
  </div>
</header>

<div class="layout">

<!-- SIDEBAR -->
<aside>
  <div class="sl">Modo</div>
  <button class="cb active" id="sb-tv" onclick="setMode('tv')"><span class="ic">ЁЯУ║</span>TV<span class="ct" id="cn-tv">0</span></button>
  <button class="cb" id="sb-radio" onclick="setMode('radio')"><span class="ic">ЁЯУ╗</span>Radio<span class="ct" id="cn-radio">0</span></button>
  <button class="cb" onclick="showFavs()"><span class="ic">тнР</span>Favoritos<span class="ct" id="cn-fav">0</span></button>
  <div class="sl" id="cat-label">Categor├нas</div>
  <div id="sb-cats">
    <button class="cb active" onclick="setCat('all',this)"><span class="ic">ЁЯУЛ</span>Todos<span class="ct" id="cn-all">0</span></button>
    <button class="cb" onclick="setCat('Noticias',this)"><span class="ic">ЁЯУ░</span>Noticias<span class="ct" id="cn-Noticias">0</span></button>
    <button class="cb" onclick="setCat('Deportes',this)"><span class="ic">тЪ╜</span>Deportes<span class="ct" id="cn-Deportes">0</span></button>
    <button class="cb" onclick="setCat('Entretenimiento',this)"><span class="ic">ЁЯОм</span>Entretenimiento<span class="ct" id="cn-Entretenimiento">0</span></button>
    <button class="cb" onclick="setCat('Pel├нculas',this)"><span class="ic">ЁЯОе</span>Pel├нculas<span class="ct" id="cn-Pel├нculas">0</span></button>
    <button class="cb" onclick="setCat('Series',this)"><span class="ic">ЁЯУ║</span>Series<span class="ct" id="cn-Series">0</span></button>
    <button class="cb" onclick="setCat('Infantil',this)"><span class="ic">ЁЯзТ</span>Infantil<span class="ct" id="cn-Infantil">0</span></button>
    <button class="cb" onclick="setCat('M├║sica',this)"><span class="ic">ЁЯО╡</span>M├║sica<span class="ct" id="cn-M├║sica">0</span></button>
    <button class="cb" onclick="setCat('Documentales',this)"><span class="ic">ЁЯМН</span>Documentales<span class="ct" id="cn-Documentales">0</span></button>
    <button class="cb" onclick="setCat('Religiosos',this)"><span class="ic">ЁЯЩП</span>Religiosos<span class="ct" id="cn-Religiosos">0</span></button>
    <button class="cb" onclick="setCat('Negocios',this)"><span class="ic">ЁЯТ╝</span>Negocios<span class="ct" id="cn-Negocios">0</span></button>
    <button class="cb" onclick="setCat('General',this)"><span class="ic">ЁЯУб</span>General<span class="ct" id="cn-General">0</span></button>
  </div>
</aside>

<!-- MAIN -->
<main>

  <!-- тХРтХР ZONA SUPERIOR: PLAYER + LISTA LATERAL тХРтХР -->
  <div class="top-zone">

    <!-- PLAYER -->
    <div class="player-col">
      <!-- VIDEO -->
      <div class="video-ratio" id="vr">
        <video id="vp" playsinline webkit-playsinline preload="none" controls></video>
        <div class="pp" id="pp"><div class="bi">ЁЯУ║</div><p>Selecciona un canal para ver</p></div>
        <div class="ld" id="ld"><div class="sp"></div></div>
        <div class="er" id="er">
          <strong>тЪая╕П Canal no disponible</strong>
          <p>Offline o bloqueado en tu regi├│n.</p>
          <div class="ebtns">
            <button class="retry" onclick="retry()">тЖ║ Reintentar</button>
            <button class="skip" onclick="nextCh()">тЦ╢ Siguiente</button>
          </div>
        </div>
      </div>
      <!-- AUDIO -->
      <div class="audio-bar" id="audioBar">
        <div class="aic">ЁЯУ╗</div>
        <div class="audio-info">
          <div class="an" id="aname">Selecciona una radio</div>
          <div class="ac" id="acat">тАФ</div>
        </div>
        <audio id="ap" controls></audio>
      </div>
      <!-- BARRA INFO -->
      <div class="pbar">
        <span class="live-b" id="liveBadge">EN VIVO</span>
        <span class="pn" id="pname">тАФ</span>
        <div class="pbts">
          <button class="pbt" id="pinBtn" onclick="togglePin()" title="Fijar reproductor">ЁЯУМ</button>
          <button class="pbt" id="fsBtn" onclick="goFS()" title="Pantalla completa">тЫ╢</button>
        </div>
      </div>
    </div>

    <!-- LISTA LATERAL DESLIZABLE -->
    <div class="ch-list-col" id="chListCol">
      <div class="ch-list-header">
        Lista <span id="listCount">0 canales</span>
      </div>
      <div class="ch-list-scroll" id="chListScroll">
        <!-- se genera din├бmicamente -->
      </div>
    </div>

  </div><!-- /top-zone -->

  <!-- TABS -->
  <div class="mode-tabs">
    <button class="mtab active" id="tab-tv" onclick="setMode('tv')">ЁЯУ║ TV en Vivo</button>
    <button class="mtab rtab" id="tab-radio" onclick="setMode('radio')">ЁЯУ╗ Radio</button>
  </div>

  <!-- FILTROS PA├НS -->
  <div class="fbar-wrap">
    <div class="fbar" id="fbar">
      <button class="chip active" onclick="setCountry('all',this)">ЁЯМР Todos</button>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid-zone">
    <div class="ch-hd">
      <h2 id="stitle">Cargando...</h2>
      <span id="scnt"></span>
    </div>
    <div class="ch-load show" id="chload">тП│ Cargando canales...</div>
    <div class="grid" id="grid"></div>
    <div class="ad"><span>CIC TV ┬╖ Espacio publicitario</span></div>
  </div>

</main>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
<script>
// тХРтХР CANALES BASE TV тХРтХР
const BASE_TV = [
  {id:'n01',name:'DW Espa├▒ol',cat:'Noticias',co:'DE',type:'tv',logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/DW_Logo_2012.svg/120px-DW_Logo_2012.svg.png',url:'https://dwamdstream102.akamaized.net/hls/live/2015525/dwstream102/index.m3u8'},
  {id:'n02',name:'France 24 ES',cat:'Noticias',co:'FR',type:'tv',logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c6/France_24_logo.svg/120px-France_24_logo.svg.png',url:'https://stream.france24.com/hls/live/2037897/F24_ES_LO_HLS/master.m3u8'},

// тХРтХР CARGAR PA├НSES EN PARALELO тХРтХР
async function loadCountries() {
  const proxies = ['https://api.allorigins.win/raw?url=','https://corsproxy.io/?url='];
  const entries = Object.entries(COUNTRY_URLS);

  await Promise.allSettled(entries.map(async ([code, slug]) => {
    const src = `https://iptv-org.github.io/iptv/countries/${slug}.m3u`;
    for (const px of proxies) {
      try {
        const r = await fetch(px + encodeURIComponent(src), {signal: AbortSignal.timeout(8000)});
        if (!r.ok) continue;
        const txt = await r.text();
        const parsed = parseM3U(txt, code, 'tv');
        const newCh = parsed.filter(c => !allTV.find(x => x.url === c.url));
        if (newCh.length > 0) {
          allTV = [...allTV, ...newCh];
          updateCounters();
          if (curMode === 'tv') { applyFilter(); renderSideList(); }
          showToast(`${CFLAGS[code]||''} ${CNAMES[code]||code}: +${newCh.length}`);
        }
        break;
      } catch(e){ continue; }
    }
  }));

  document.getElementById('chload').classList.remove('show');
  showToast(`тЬУ ${allTV.length} canales TV ┬╖ ${allRadio.length} radios`);
}

async function loadRadioExtra() {
  const proxies = ['https://api.allorigins.win/raw?url=','https://corsproxy.io/?url='];

  for (const px of proxies) {

      const newR = parsed.filter(c => !allRadio.find(x => x.url === c.url));

function parseM3U(txt, co, type) {
  const lines = txt.split('\n');
  const res = [];
  let cur = {};
  for (let l of lines) {
    l = l.trim();
    if (l.startsWith('#EXTINF')) {
      const nameM = l.match(/tvg-name="([^"]*)"/);
      const logoM = l.match(/tvg-logo="([^"]*)"/);
      const catM  = l.match(/group-title="([^"]*)"/);
      cur = {
        name: nameM ? nameM[1] : l.split(',').pop().trim(),
        logo: logoM ? logoM[1] : '',
        cat: CAT_MAP[(catM ? catM[1] : '').toLowerCase()] || 'General',
        co, type,
      };
    } else if (l && !l.startsWith('#') && cur.name) {
      cur.url = l;
      cur.id = type[0] + Math.random().toString(36).slice(2,8);
      res.push({...cur}); cur = {};
    }
  }
  return res;
}

// тХРтХР PLAYER тХРтХР
function play(id) {
  const src = [...allTV, ...allRadio];
  const ch = src.find(c => c.id === id);
  if (!ch) return;
  curCh = ch;
  curIdx = filtered.findIndex(c => c.id === id);

  // Activar modo correcto
  if (ch.type !== curMode) setMode(ch.type);

  document.getElementById('pname').textContent = ch.name;

  // Marcar en grid y lista
  document.querySelectorAll('.card').forEach(c => c.classList.remove('playing','rplaying'));
  document.querySelectorAll('.ch-list-item').forEach(c => c.classList.remove('active','radio-active'));
  const cd = document.getElementById('cd-'+id);
  const ls = document.getElementById('ls-'+id);
  if (cd) { cd.classList.add(ch.type==='radio'?'rplaying':'playing'); cd.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  if (ls) { ls.classList.add(ch.type==='radio'?'radio-active':'active'); ls.scrollIntoView({behavior:'smooth',block:'nearest'}); }

  if (ch.type === 'radio') {
    playRadio(ch);
  } else {
    playVideo(ch);
  }
}

function playVideo(ch) {
  document.getElementById('pp').classList.add('hide');
  document.getElementById('er').classList.remove('show');
  document.getElementById('ld').classList.add('show');
  clearTimeout(errTimer);
  errTimer = setTimeout(() => { if(document.getElementById('ld').classList.contains('show')) showErr(); }, 15000);
  const v = document.getElementById('vp');
  if (hlsObj) { hlsObj.destroy(); hlsObj = null; }
  v.src = ''; v.load();
  if (Hls.isSupported()) {
    hlsObj = new Hls({enableWorker:true,lowLatencyMode:true,startLevel:-1});
    hlsObj.loadSource(ch.url);
    hlsObj.attachMedia(v);
    hlsObj.on(Hls.Events.MANIFEST_PARSED, () => {
      clearTimeout(errTimer);
      document.getElementById('ld').classList.remove('show');
      v.play().catch(()=>{});
    });
    hlsObj.on(Hls.Events.ERROR, (_,d) => { if(d.fatal) tryNative(v, ch.url); });
  } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
    tryNative(v, ch.url);
  } else { tryNative(v, ch.url); }
}

function tryNative(v, url) {
  clearTimeout(errTimer);
  document.getElementById('ld').classList.add('show');
  v.src = url; v.load();
  v.play().then(()=>document.getElementById('ld').classList.remove('show')).catch(()=>document.getElementById('ld').classList.remove('show'));
  errTimer = setTimeout(()=>{ if(v.readyState<2) showErr(); }, 10000);
}

function playRadio(ch) {
  document.getElementById('aname').textContent = ch.name;
  document.getElementById('acat').textContent = ch.cat + (ch.co ? ' ┬╖ ' + (CNAMES[ch.co]||ch.co) : '');
  const a = document.getElementById('ap');
  a.src = ch.url;
  a.play().catch(()=>{});
  showToast('ЁЯУ╗ ' + ch.name);
}

const vp = document.getElementById('vp');
vp.addEventListener('canplay', () => { clearTimeout(errTimer); document.getElementById('ld').classList.remove('show'); });
vp.addEventListener('playing', () => { clearTimeout(errTimer); document.getElementById('ld').classList.remove('show'); });
vp.addEventListener('error', () => showErr());

function showErr() { clearTimeout(errTimer); document.getElementById('ld').classList.remove('show'); document.getElementById('er').classList.add('show'); }
function retry() { if(curCh) play(curCh.id); }
function nextCh() { if(!filtered.length) return; const n=filtered[(curIdx+1)%filtered.length]; play(n.id); }

function togglePin() {
  isPinned = !isPinned;
  const btn = document.getElementById('pinBtn');
  const ps = document.querySelector('.player-col');
  btn.classList.toggle('pin-on', isPinned);
  btn.title = isPinned ? 'Desfijar' : 'Fijar reproductor';
  if (isPinned) {
    ps.style.position = 'sticky';
    ps.style.top = '52px';
    ps.style.zIndex = '90';
    showToast('ЁЯУМ Reproductor fijado');
  } else {
    ps.style.position = '';
    ps.style.top = '';
    ps.style.zIndex = '';
    showToast('Reproductor libre');
  }
}

function goFS() {
  const el = document.getElementById('vr');
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  } else {
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  }
}

function toggleFav(e, id) {
  e.stopPropagation();
  const i = favs.indexOf(id);
  if (i===-1) { favs.push(id); showToast('тнР Favorito agregado'); }
  else { favs.splice(i,1); showToast('Eliminado de favoritos'); }
  localStorage.setItem('cicFavs2', JSON.stringify(favs));
  updateCounters();
  const btn = document.querySelector('#cd-'+id+' .favbtn');
  if (btn) { btn.classList.toggle('on', favs.includes(id)); btn.textContent = favs.includes(id)?'тнР':'тШЖ'; }
}

let tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tt); tt = setTimeout(()=>t.classList.remove('show'), 2500);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/CIC-TV/sw.js').catch(()=>{});
</script>
