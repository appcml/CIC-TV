<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<title>CIC TV — Canales en Vivo</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --bg3: #1a1a26;
  --bg4: #22223a;
  --accent: #e63f6e;
  --accent2: #ff6b35;
  --blue: #4f8ef7;
  --text: #f0f0f8;
  --text2: #9090b0;
  --text3: #5050708;
  --border: rgba(255,255,255,0.07);
  --radius: 12px;
  --sidebar: 260px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

/* ─── HEADER ─── */
header {
  position: fixed; top:0; left:0; right:0; z-index:100;
  height: 58px;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.5px;
  color: var(--text);
  flex-shrink: 0;
}
.logo span { color: var(--accent); }

.search-wrap {
  flex: 1; max-width: 480px; position: relative;
}
.search-wrap svg {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text2); pointer-events: none;
}
#search {
  width: 100%; padding: 9px 14px 9px 42px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 24px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  outline: none; transition: border-color .2s;
}
#search:focus { border-color: rgba(230,63,110,0.5); }
#search::placeholder { color: var(--text2); }

.header-actions { margin-left: auto; display: flex; gap: 8px; }
.btn-pill {
  padding: 7px 16px; border-radius: 20px; border: none;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .2s;
}
.btn-pill.ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-pill.ghost:hover { background: var(--bg4); color: var(--text); }
.btn-pill.primary { background: var(--accent); color: #fff; }
.btn-pill.primary:hover { background: #d4315e; }

/* ─── LAYOUT ─── */
.layout {
  display: flex;
  padding-top: 58px;
  height: 100vh;
}

/* ─── SIDEBAR ─── */
aside {
  width: var(--sidebar);
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  height: calc(100vh - 58px);
  position: sticky; top: 58px;
  padding: 16px 12px;
  display: flex; flex-direction: column; gap: 4px;
}

.sidebar-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text2);
  padding: 12px 10px 6px;
}

.cat-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 8px;
  border: none; background: transparent; color: var(--text2);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  cursor: pointer; transition: all .18s; text-align: left; width: 100%;
}
.cat-btn:hover { background: var(--bg3); color: var(--text); }
.cat-btn.active { background: rgba(230,63,110,0.15); color: var(--accent); }
.cat-btn .icon { font-size: 16px; width: 20px; text-align: center; }
.cat-btn .count {
  margin-left: auto; font-size: 11px;
  background: var(--bg4); color: var(--text2);
  padding: 2px 7px; border-radius: 10px;
}
.cat-btn.active .count { background: rgba(230,63,110,0.2); color: var(--accent); }

/* ─── MAIN CONTENT ─── */
main {
  flex: 1; overflow-y: auto;
  padding: 20px 24px;
  display: flex; flex-direction: column; gap: 16px;
}

/* ─── PLAYER ─── */
.player-section {
  background: #000;
  border-radius: var(--radius);
  overflow: hidden;
  aspect-ratio: 16/9;
  max-height: 420px;
  position: relative;
  border: 1px solid var(--border);
}

#video-player {
  width: 100%; height: 100%;
  object-fit: contain; background: #000;
}

.player-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  color: var(--text2);
}
.player-placeholder .big-icon {
  font-size: 56px; opacity: 0.3;
}
.player-placeholder p { font-size: 15px; opacity: 0.6; }

.player-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 12px 16px;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  display: flex; align-items: center; gap: 10px;
  opacity: 0; transition: opacity .2s;
}
.player-section:hover .player-info { opacity: 1; }
.player-info .live-badge {
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  padding: 3px 7px; border-radius: 4px;
  text-transform: uppercase;
}
.player-info .channel-name {
  font-weight: 600; font-size: 15px;
}

.player-controls {
  position: absolute; top: 10px; right: 10px;
  display: flex; gap: 6px;
}
.ctrl-btn {
  background: rgba(0,0,0,0.6); border: none; color: #fff;
  width: 32px; height: 32px; border-radius: 6px;
  cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.2); }

/* ─── FILTERS BAR ─── */
.filters-bar {
  display: flex; align-items: center; gap: 8px;
  overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none;
}
.filters-bar::-webkit-scrollbar { display: none; }

.filter-chip {
  flex-shrink: 0;
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg2); color: var(--text2);
  font-size: 13px; cursor: pointer;
  transition: all .18s; white-space: nowrap;
}
.filter-chip:hover { border-color: var(--accent); color: var(--text); }
.filter-chip.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}

/* ─── SECTION TITLE ─── */
.section-head {
  display: flex; align-items: center; justify-content: space-between;
}
.section-head h2 {
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 17px;
}
.section-head span { font-size: 13px; color: var(--text2); }

/* ─── CHANNELS GRID ─── */
.channels-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

.channel-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden; cursor: pointer;
  transition: all .2s; position: relative;
}
.channel-card:hover {
  border-color: rgba(230,63,110,0.4);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.channel-card.playing {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}

.card-logo {
  aspect-ratio: 16/9;
  background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.card-logo img {
  max-width: 80%; max-height: 70%;
  object-fit: contain; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
}
.card-logo .logo-fallback {
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700;
  color: var(--text2); text-align: center; padding: 8px;
}

.live-dot {
  position: absolute; top: 6px; left: 6px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100%{ opacity: 1; transform: scale(1); }
  50%{ opacity: 0.6; transform: scale(1.3); }
}

.card-info {
  padding: 8px 10px;
}
.card-name {
  font-size: 12px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
.card-cat {
  font-size: 10px; color: var(--text2); margin-top: 2px;
}

.fav-btn {
  position: absolute; top: 5px; right: 5px;
  background: rgba(0,0,0,0.6); border: none;
  width: 26px; height: 26px; border-radius: 6px;
  color: var(--text2); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all .18s; opacity: 0;
}
.channel-card:hover .fav-btn { opacity: 1; }
.fav-btn.active { opacity: 1; color: #ffcc00; }
.fav-btn:hover { background: rgba(255,204,0,0.2); color: #ffcc00; }

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text2);
}
.empty-state .big { font-size: 48px; opacity:.3; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 10px 20px; border-radius: 24px;
  font-size: 13px; z-index: 999; transition: transform .3s;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ─── QUALITY BADGE ─── */
.quality {
  position: absolute; bottom: 6px; right: 6px;
  background: rgba(0,0,0,0.7); color: var(--text2);
  font-size: 9px; font-weight: 600; letter-spacing: .5px;
  padding: 2px 5px; border-radius: 4px;
}

/* ─── LOADING ─── */
.loading {
  position: absolute; inset: 0;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.7);
}
.loading.show { display: flex; }
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid var(--bg4);
  border-top-color: var(--accent);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── ERROR ─── */
.stream-error {
  position: absolute; inset: 0;
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  background: rgba(0,0,0,0.85); color: var(--text2);
}
.stream-error.show { display: flex; }
.stream-error button {
  padding: 8px 20px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
}

/* MOBILE */
@media (max-width: 768px) {
  aside { display: none; }
  :root { --sidebar: 0px; }
  main { padding: 12px; }
  .channels-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
  header { padding: 0 12px; gap: 10px; }
  .logo { font-size: 17px; }
  .header-actions { display: none; }
}

/* AD SLOT */
.ad-slot {
  background: var(--bg2); border: 1px dashed var(--border);
  border-radius: var(--radius); padding: 16px;
  text-align: center; color: var(--text2); font-size: 12px;
  min-height: 60px; display: flex; align-items: center; justify-content: center;
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">CIC<span> TV</span></div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Buscar canales..." oninput="filterChannels()">
  </div>
  <div class="header-actions">
    <button class="btn-pill ghost" onclick="showFavorites()">⭐ Favoritos</button>
    <button class="btn-pill ghost" onclick="loadChannels()">↻ Actualizar</button>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-label">Categorías</div>
    <button class="cat-btn active" onclick="selectCat('all',this)" data-cat="all">
      <span class="icon">📺</span> Todos
      <span class="count" id="cnt-all">0</span>
    </button>
    <button class="cat-btn" onclick="selectCat('favoritos',this)" data-cat="favoritos">
      <span class="icon">⭐</span> Favoritos
      <span class="count" id="cnt-fav">0</span>
    </button>
    <div class="sidebar-label">Por categoría</div>
    <button class="cat-btn" onclick="selectCat('Noticias',this)">
      <span class="icon">📰</span> Noticias
      <span class="count" id="cnt-Noticias">0</span>
    </button>
    <button class="cat-btn" onclick="selectCat('Deportes',this)">
      <span class="icon">⚽</span> Deportes
      <span class="count" id="cnt-Deportes">0</span>
    </button>
    <button class="cat-btn" onclick="selectCat('Entretenimiento',this)">
      <span class="icon">🎬</span> Entretenimiento
      <span class="count" id="cnt-Entretenimiento">0</span>
    </button>
    <button class="cat-btn" onclick="selectCat('Películas',this)">
      <span class="icon">🎥</span> Películas
      <span class="count" id="cnt-Películas">0</span>
    </button>
    <button class="cat-btn" onclick="selectCat('Infantil',this)">
      <span class="icon">🧒</span> Infantil
      <span class="count" id="cnt-Infantil">0</span>
    </button>
    <button class="cat-btn" onclick="selectCat('Música',this)">
      <span class="icon">🎵</span> Música
      <span class="count" id="cnt-Música">0</span>
    </button>
    <button class="cat-btn" onclick="selectCat('Documentales',this)">
      <span class="icon">🌍</span> Documentales
      <span class="count" id="cnt-Documentales">0</span>
    </button>
    <button class="cat-btn" onclick="selectCat('Religiosos',this)">
      <span class="icon">🙏</span> Religiosos
      <span class="count" id="cnt-Religiosos">0</span>
    </button>
    <button class="cat-btn" onclick="selectCat('General',this)">
      <span class="icon">📡</span> General
      <span class="count" id="cnt-General">0</span>
    </button>
  </aside>

  <!-- MAIN -->
  <main>

    <!-- AD SLOT TOP -->
    <div class="ad-slot" id="ad-top">
      <!-- Google AdSense: data-ad-client="ca-pub-XXXX" data-ad-slot="XXXX" -->
      <span>Espacio publicitario</span>
    </div>

    <!-- PLAYER -->
    <div class="player-section" id="playerSection">
      <video id="video-player" controls playsinline></video>
      <div class="player-placeholder" id="playerPlaceholder">
        <div class="big-icon">📺</div>
        <p>Selecciona un canal para ver</p>
      </div>
      <div class="player-info" id="playerInfo">
        <span class="live-badge">EN VIVO</span>
        <span class="channel-name" id="nowPlaying">—</span>
      </div>
      <div class="player-controls">
        <button class="ctrl-btn" onclick="toggleFullscreen()" title="Pantalla completa">⛶</button>
      </div>
      <div class="loading" id="loadingSpinner">
        <div class="spinner"></div>
      </div>
      <div class="stream-error" id="streamError">
        <span>⚠️ No se pudo cargar el canal</span>
        <button onclick="retryChannel()">Reintentar</button>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters-bar" id="filtersBar">
      <span style="font-size:12px;color:var(--text2);flex-shrink:0;">Filtrar por país:</span>
    </div>

    <!-- SECTION HEAD -->
    <div class="section-head">
      <h2 id="sectionTitle">Todos los canales</h2>
      <span id="channelCount">Cargando...</span>
    </div>

    <!-- GRID -->
    <div class="channels-grid" id="channelsGrid">
      <!-- skeleton -->
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text2)">
        Cargando canales...
      </div>
    </div>

    <!-- AD SLOT BOTTOM -->
    <div class="ad-slot" id="ad-bottom">
      <span>Espacio publicitario</span>
    </div>

  </main>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const PROXY = 'https://corsproxy.io/?url=';
const M3U_SOURCES = [
  'https://iptv-org.github.io/iptv/index.m3u',
  'https://raw.githubusercontent.com/Free-TV/IPTV/master/playlist.m3u8',
  'https://raw.githubusercontent.com/iptv-org/iptv/master/streams/es.m3u',
];

let allChannels = [];
let filteredChannels = [];
let favorites = JSON.parse(localStorage.getItem('snFavorites') || '[]');
let currentCat = 'all';
let currentSearch = '';
let currentCountry = 'all';
let currentChannel = null;
let hls = null;
let retryUrl = null;

const CAT_MAP = {
  'news': 'Noticias', 'sports': 'Deportes', 'entertainment': 'Entretenimiento',
  'movies': 'Películas', 'kids': 'Infantil', 'music': 'Música',
  'documentary': 'Documentales', 'religious': 'Religiosos',
  'general': 'General', 'undefined': 'General', 'auto': 'General',
  'classic': 'Entretenimiento', 'comedy': 'Entretenimiento',
  'culture': 'Entretenimiento', 'animation': 'Infantil',
  'family': 'Infantil', 'series': 'Entretenimiento',
};

async function loadChannels() {
  showToast('Actualizando canales...');
  try {
    let text = '';
    for (const src of M3U_SOURCES) {
      try {
        const res = await fetch(PROXY + encodeURIComponent(src));
        if (res.ok) { text = await res.text(); break; }
      } catch(e) { continue; }
    }
    if (!text) throw new Error('No sources');
    
    allChannels = parseM3U(text);
    updateCounters();
    applyFilters();
    showToast(`✓ ${allChannels.length} canales cargados`);
  } catch(e) {
    document.getElementById('channelsGrid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="big">⚠️</div>
        <p>Error al cargar. Verifica tu conexión.</p>
      </div>`;
    showToast('Error al cargar canales');
  }
}

function parseM3U(text) {
  const lines = text.split('\n');
  const channels = [];
  let current = {};
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.startsWith('#EXTINF')) {
      current = {};
      current.name = line.split(',').pop().trim();
      const logoM = line.match(/tvg-logo="([^"]*)"/);
      const catM = line.match(/group-title="([^"]*)"/);
      const countryM = line.match(/tvg-country="([^"]*)"/);
      const langM = line.match(/tvg-language="([^"]*)"/);
      current.logo = logoM ? logoM[1] : '';
      const rawCat = catM ? catM[1].toLowerCase() : 'general';
      current.category = CAT_MAP[rawCat] || 'General';
      current.country = countryM ? countryM[1].toUpperCase() : '';
      current.lang = langM ? langM[1] : '';
    } else if (line && !line.startsWith('#') && current.name) {
      current.url = line;
      current.id = btoa(line).slice(0,12);
      channels.push({ ...current });
      current = {};
    }
  }
  return channels;
}

function updateCounters() {
  const cats = ['Noticias','Deportes','Entretenimiento','Películas','Infantil','Música','Documentales','Religiosos','General'];
  document.getElementById('cnt-all').textContent = allChannels.length;
  document.getElementById('cnt-fav').textContent = favorites.length;
  cats.forEach(c => {
    const el = document.getElementById('cnt-'+c);
    if (el) el.textContent = allChannels.filter(ch => ch.category === c).length;
  });

  // Country filters
  const countries = [...new Set(allChannels.map(c=>c.country).filter(Boolean))].sort();
  const bar = document.getElementById('filtersBar');
  bar.innerHTML = '<span style="font-size:12px;color:var(--text2);flex-shrink:0;">País:</span>';
  const allChip = document.createElement('button');
  allChip.className = 'filter-chip active';
  allChip.textContent = '🌐 Todos';
  allChip.onclick = () => { currentCountry = 'all'; document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active')); allChip.classList.add('active'); applyFilters(); };
  bar.appendChild(allChip);
  countries.slice(0,20).forEach(co => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip';
    btn.textContent = co;
    btn.onclick = () => {
      currentCountry = co;
      document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    };
    bar.appendChild(btn);
  });
}

function selectCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  applyFilters();
}

function showFavorites() {
  selectCat('favoritos', null);
  document.querySelectorAll('.cat-btn').forEach(b=>{
    if(b.dataset.cat==='favoritos') b.classList.add('active');
    else b.classList.remove('active');
  });
}

function filterChannels() {
  currentSearch = document.getElementById('search').value.toLowerCase();
  applyFilters();
}

function applyFilters() {
  let list = allChannels;

  if (currentCat === 'favoritos') {
    list = list.filter(c => favorites.includes(c.id));
  } else if (currentCat !== 'all') {
    list = list.filter(c => c.category === currentCat);
  }

  if (currentCountry !== 'all') {
    list = list.filter(c => c.country === currentCountry);
  }

  if (currentSearch) {
    list = list.filter(c => c.name.toLowerCase().includes(currentSearch));
  }

  filteredChannels = list;
  renderGrid();

  const title = currentCat === 'all' ? 'Todos los canales'
    : currentCat === 'favoritos' ? '⭐ Favoritos'
    : currentCat;
  document.getElementById('sectionTitle').textContent = title;
  document.getElementById('channelCount').textContent = `${filteredChannels.length} canales`;
}

function renderGrid() {
  const grid = document.getElementById('channelsGrid');
  if (!filteredChannels.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="big">📭</div>
      <p>Sin canales para esta selección</p>
    </div>`;
    return;
  }

  const limit = 200;
  const shown = filteredChannels.slice(0, limit);

  grid.innerHTML = shown.map(ch => {
    const isFav = favorites.includes(ch.id);
    const isPlaying = currentChannel && currentChannel.id === ch.id;
    return `
    <div class="channel-card ${isPlaying?'playing':''}" onclick="playChannel('${ch.id}')" id="card-${ch.id}">
      <div class="card-logo">
        ${ch.logo ? `<img src="${ch.logo}" alt="${ch.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="logo-fallback" style="display:none">${ch.name.slice(0,3).toUpperCase()}</div>`
        : `<div class="logo-fallback">${ch.name.slice(0,3).toUpperCase()}</div>`}
        <div class="live-dot"></div>
      </div>
      <div class="card-info">
        <div class="card-name" title="${ch.name}">${ch.name}</div>
        <div class="card-cat">${ch.category}${ch.country?' · '+ch.country:''}</div>
      </div>
      <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav(event,'${ch.id}')" title="${isFav?'Quitar favorito':'Agregar a favoritos'}">
        ${isFav?'⭐':'☆'}
      </button>
    </div>`;
  }).join('');

  if (filteredChannels.length > limit) {
    grid.innerHTML += `<div style="grid-column:1/-1;text-align:center;padding:12px;color:var(--text2);font-size:13px">
      Mostrando ${limit} de ${filteredChannels.length} canales. Usa la búsqueda para filtrar más.
    </div>`;
  }
}

function playChannel(id) {
  const ch = allChannels.find(c => c.id === id);
  if (!ch) return;
  currentChannel = ch;
  retryUrl = ch.url;

  document.getElementById('playerPlaceholder').style.display = 'none';
  document.getElementById('streamError').classList.remove('show');
  document.getElementById('loadingSpinner').classList.add('show');
  document.getElementById('nowPlaying').textContent = ch.name;

  document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('playing'));
  const card = document.getElementById('card-'+id);
  if (card) { card.classList.add('playing'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }

  const video = document.getElementById('video-player');
  if (hls) { hls.destroy(); hls = null; }

  const url = ch.url;
  if (Hls.isSupported() && (url.includes('.m3u8') || url.includes('m3u'))) {
    hls = new Hls({ enableWorker: false, lowLatencyMode: true });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(()=>{});
      document.getElementById('loadingSpinner').classList.remove('show');
    });
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) showStreamError();
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play().catch(()=>{});
    document.getElementById('loadingSpinner').classList.remove('show');
  } else {
    video.src = url;
    video.play().catch(()=>{ showStreamError(); });
    document.getElementById('loadingSpinner').classList.remove('show');
  }

  video.oncanplay = () => document.getElementById('loadingSpinner').classList.remove('show');
  video.onerror = () => showStreamError();
}

function showStreamError() {
  document.getElementById('loadingSpinner').classList.remove('show');
  document.getElementById('streamError').classList.add('show');
}

function retryChannel() {
  if (retryUrl && currentChannel) playChannel(currentChannel.id);
}

function toggleFav(e, id) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
    showToast('⭐ Agregado a favoritos');
  } else {
    favorites.splice(idx, 1);
    showToast('Eliminado de favoritos');
  }
  localStorage.setItem('snFavorites', JSON.stringify(favorites));
  updateCounters();
  const btn = document.querySelector(`#card-${id} .fav-btn`);
  if (btn) {
    btn.classList.toggle('active', favorites.includes(id));
    btn.textContent = favorites.includes(id) ? '⭐' : '☆';
  }
}

function toggleFullscreen() {
  const el = document.getElementById('playerSection');
  if (!document.fullscreenElement) el.requestFullscreen();
  else document.exitFullscreen();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
loadChannels();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

</script>
</body>
</html>
