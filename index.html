<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="renderer" content="webkit">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CIC TV — Canales en Vivo</title>
<link rel="manifest" href="manifest.json">
<meta name="google-adsense-account" content="ca-pub-6387207876125603">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6387207876125603" crossorigin="anonymous"></script>
<meta name="apple-touch-fullscreen" content="yes">
<style>
  :root { --app-height: 100%; }
  html { height: var(--app-height); }
</style>
<script>
  function setAppHeight() {
    document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
  }
  window.addEventListener('resize', setAppHeight);
  setAppHeight();
</script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
  --accent:#e63f6e;--accent2:#ff9900;
  --text:#f0f0f8;--text2:#9090b0;
  --border:rgba(255,255,255,0.07);--radius:12px;--sidebar:190px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* HEADER */
header{flex-shrink:0;height:52px;background:rgba(10,10,15,0.98);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 12px;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:-0.5px;flex-shrink:0}
.logo span{color:var(--accent)}
.sw{flex:1;position:relative}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;width:13px;height:13px}
#search{width:100%;padding:7px 10px 7px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:24px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
#search:focus{border-color:rgba(230,63,110,0.5)}
#search::placeholder{color:var(--text2)}
.hbts{margin-left:auto;display:flex;gap:5px;flex-shrink:0}
.hbt{padding:5px 11px;border-radius:16px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.hbt:hover{background:var(--bg4);color:var(--text)}
.hbt.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.hbt.ron{background:var(--accent2);color:#000;border-color:var(--accent2)}

/* BODY LAYOUT */
.body{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
aside{width:var(--sidebar);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);padding:10px 10px 4px;flex-shrink:0}
.cb{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;text-align:left;width:100%;white-space:nowrap;flex-shrink:0}
.cb:hover{background:var(--bg3);color:var(--text)}
.cb.active{background:rgba(230,63,110,0.15);color:var(--accent)}
.cb.ron{background:rgba(255,153,0,0.15);color:var(--accent2)}
.cb .ic{font-size:13px;width:16px;text-align:center}
.cb .ct{margin-left:auto;font-size:10px;background:var(--bg4);color:var(--text2);padding:1px 5px;border-radius:6px;min-width:18px;text-align:center}
.cb.active .ct{background:rgba(230,63,110,0.2);color:var(--accent)}

/* MAIN */
main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ZONA PLAYER */
.player-zone{
  display:flex;
  flex-shrink:0;
  height:calc(86vh - 52px - 35px);
  border-bottom:2px solid var(--border);
  background:#000;
  align-items:stretch;
}

/* PLAYER */
.player-col{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  background:#000;position:relative;
}
.video-ratio{
  flex:1;position:relative;overflow:hidden;background:#000;
}
.video-ratio video{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:contain;border:none;
}
.audio-zone{
  display:none;flex:1;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;background:var(--bg2);padding:16px;
}
.audio-zone.show{display:flex}
.audio-zone .aicon{font-size:40px}
.audio-zone .aname{font-weight:600;font-size:14px;text-align:center}
.audio-zone .acat{font-size:11px;color:var(--text2)}
.audio-zone audio{width:100%;height:36px;accent-color:var(--accent2);margin-top:8px}

/* placeholder */
.pp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:#000;color:var(--text2);z-index:2}
.pp .bi{font-size:36px;opacity:.15}
.pp p{font-size:11px;opacity:.35}
.pp.hide{display:none}

/* loading */
.ld{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);z-index:4}
.ld.show{display:flex}
.sp{width:26px;height:26px;border-radius:50%;border:3px solid var(--bg4);border-top-color:var(--accent);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* error */
.er{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:rgba(0,0,0,0.9);color:var(--text2);font-size:12px;text-align:center;padding:12px;z-index:4}
.er.show{display:flex}
.er strong{color:var(--text);font-size:13px}
.ebtns{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;justify-content:center}
.ebtns button{padding:5px 12px;border-radius:7px;border:none;cursor:pointer;font-size:11px;font-weight:500}
.retry{background:var(--accent);color:#fff}
.skip{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}



/* BARRA PLAYER */
.pbar{
  flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);
  padding:6px 12px;display:flex;align-items:center;gap:8px;
  min-height:36px;
}
.live-b{background:var(--accent);color:#fff;font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 5px;border-radius:3px;flex-shrink:0}
.radio-b{background:var(--accent2);color:#000;font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 5px;border-radius:3px;flex-shrink:0}
.pn{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.pbts{display:flex;gap:3px}
.pbt{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:24px;height:24px;border-radius:5px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pbt:hover{background:var(--bg4);color:var(--text)}
.pbt.pin-on{background:rgba(230,63,110,0.2);color:var(--accent);border-color:var(--accent)}
.pbt.fav-on{background:rgba(255,204,0,0.15);color:#ffcc00;border-color:#ffcc00;font-size:13px}

/* LISTA LATERAL */
.ch-side{
  width:180px;flex-shrink:0;
  background:var(--bg2);border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  position:relative;
  overflow:hidden;
}
.ch-side-hd{
  flex-shrink:0;padding:7px 10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.ch-side-hd span{font-family:'Syne',sans-serif;font-weight:700;font-size:12px}
.ch-side-hd small{color:var(--text2);font-size:10px}

/* Flechas navegación */
.side-nav{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:4px 8px;border-bottom:1px solid var(--border);background:var(--bg3);
}
.side-arrow{
  background:var(--bg4);border:1px solid var(--border);color:var(--text2);
  width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
  user-select:none;
}
.side-arrow:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.side-pos{font-size:10px;color:var(--text2)}

/* Lista */
.ch-side-list{
  flex:1;overflow-y:auto;overflow-x:hidden;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.side-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;cursor:pointer;
  transition:all .15s;border-bottom:1px solid var(--border);
  position:relative;
}
.side-item:hover{background:var(--bg3)}

/* ══ CANAL ACTIVO EN LISTA LATERAL ══ */
.side-item.active{
  background:rgba(230,63,110,0.14);
  border-left:3px solid var(--accent);
  padding-left:8px;
}
.side-item.ractive{
  background:rgba(255,153,0,0.12);
  border-left:3px solid var(--accent2);
  padding-left:8px;
}

.side-logo{
  width:38px;height:38px;border-radius:6px;
  background:var(--bg3);object-fit:contain;padding:3px;flex-shrink:0;
}
.side-fb{
  width:38px;height:38px;border-radius:6px;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--text2);flex-shrink:0;
}
.side-fb.rfb{background:rgba(255,153,0,0.1);color:var(--accent2)}
.side-info{flex:1;min-width:0}
.side-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-cat{font-size:9px;color:var(--text2);margin-top:1px}
.side-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 2s infinite}
.side-dot.rd{background:var(--accent2)}

/* Botón fav lista lateral */
.side-fav{
  background:none;border:none;color:var(--text2);
  cursor:pointer;font-size:12px;padding:2px 4px;
  flex-shrink:0;opacity:0;transition:all .15s;
  line-height:1;
}
.side-item:hover .side-fav{opacity:1}
.side-fav.on{opacity:1;color:#ffcc00}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ZONA INFERIOR */
.bottom-zone{display:none}
/* Ad móvil inferior: oculto en desktop */
.ad-bottom-mobile{display:none}

/* TABS */
.mode-tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--border)}
.mtab{flex:1;padding:7px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.mtab.active{color:var(--accent);border-bottom-color:var(--accent)}
.mtab.rtab.active{color:var(--accent2);border-bottom-color:var(--accent2)}

/* FILTROS PAÍS */
.fbar-wrap{flex-shrink:0;padding:5px 10px;border-bottom:1px solid var(--border);background:var(--bg2)}
.fbar{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.fbar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:3px 10px;border-radius:14px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* GRID */
.grid-zone{flex:1;overflow-y:auto;min-height:0}
.ch-hd{display:flex;align-items:center;justify-content:space-between;padding:7px 12px 3px;flex-shrink:0}
.ch-hd h2{font-family:'Syne',sans-serif;font-weight:700;font-size:13px}
.ch-hd span{font-size:10px;color:var(--text2)}
.ch-load{text-align:center;padding:12px;color:var(--text2);font-size:11px;display:none}
.ch-load.show{display:block}
.grid{padding:5px 8px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .18s;position:relative}
.card:hover{border-color:rgba(230,63,110,0.4);transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,0.4)}
.card:active{transform:scale(0.97)}
.card.playing{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.card.rplaying{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent2)}
.clogo{width:100%;height:62px;object-fit:contain;background:var(--bg3);padding:5px;display:block}
.cfb{width:100%;height:62px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text2)}
.cfb.rfb{background:rgba(255,153,0,0.08);color:var(--accent2);font-size:18px}
.ldot{position:absolute;top:3px;left:3px;width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
.ldot.rd{background:var(--accent2)}
.cinfo{padding:5px 6px}
.cname{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ccat{font-size:9px;color:var(--text2);margin-top:1px}
.favbtn{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.7);border:none;width:18px;height:18px;border-radius:3px;color:var(--text2);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.card:hover .favbtn,.favbtn.on{opacity:1}
.favbtn.on{color:#ffcc00}
.empty{text-align:center;padding:24px;color:var(--text2);grid-column:1/-1;font-size:12px}

/* TOAST */
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:18px;font-size:12px;z-index:999;transition:transform .25s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* AD */
.ad{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);padding:4px 6px;text-align:center;color:var(--text2);font-size:10px;height:50px;min-height:50px;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* Contador canales en header */
#cnt-tv-hdr,#cnt-radio-hdr{
  font-size:9px;opacity:0.85;
  background:rgba(255,255,255,0.18);
  padding:1px 5px;border-radius:8px;margin-left:3px;
  vertical-align:middle;transition:all .3s;
}
.hbt.on #cnt-tv-hdr{background:rgba(255,255,255,0.3)}
.hbt.ron #cnt-radio-hdr{background:rgba(0,0,0,0.2)}

/* BARRA PAÍSES LISTA LATERAL */
.side-countries{
  flex-shrink:0;
  padding:5px 6px;
  border-bottom:1px solid var(--border);
  background:var(--bg3);
  overflow:hidden;
}
.side-countries-bar{
  display:flex;gap:4px;
  overflow-x:auto !important;
  overflow-y:hidden;
  scrollbar-width:thin;
  scrollbar-color:var(--accent) transparent;
  padding-bottom:4px;
  -webkit-overflow-scrolling:touch;
  cursor:grab;
}
.side-countries-bar:active{cursor:grabbing}
.side-countries-bar::-webkit-scrollbar{height:3px}
.side-countries-bar::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
.sc-chip{
  flex-shrink:0;
  padding:3px 8px;border-radius:12px;
  border:1px solid var(--border);
  background:var(--bg4);color:var(--text2);
  font-size:10px;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.sc-chip:hover{border-color:var(--accent);color:var(--text)}
.sc-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* BOTÓN SALIR FULLSCREEN */
.fs-exit{
  display:none;
  position:fixed;top:14px;right:14px;z-index:99999;
  background:rgba(230,63,110,0.9);border:none;
  color:#fff;padding:8px 18px;border-radius:20px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;backdrop-filter:blur(8px);
  box-shadow:0 4px 16px rgba(0,0,0,0.5);
  letter-spacing:0.3px;
}
.fs-exit:hover{background:rgba(200,30,70,0.95);transform:scale(1.05)}
:fullscreen .fs-exit{display:block !important}
:-webkit-full-screen .fs-exit{display:block !important}
:-moz-full-screen .fs-exit{display:block !important}
:-ms-fullscreen .fs-exit{display:block !important}
body.is-fullscreen .fs-exit{display:block !important}

/* TABLET */
@media(max-width:900px) and (min-width:601px){
  :root{--sidebar:0px}
  aside{display:none}
}
@media(max-width:900px){
  .ch-side{width:180px}
  .player-zone{height:320px}
}

/* MÓVIL */
@media(max-width:600px){
  :root{--sidebar:0px}
  aside{display:none}
  body{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .body{flex:1;flex-direction:column;overflow:hidden;min-height:0}
  main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
  .ad-top-mobile{
    flex-shrink:0;height:44px;
    background:var(--bg2);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-size:10px;color:var(--text2);
  }
  .player-zone{
    flex-direction:column !important;
    flex-shrink:0;
    height:auto !important;
    min-height:0;
  }
  .player-col{
    flex:none !important;
    width:100% !important;
    display:flex;flex-direction:column;position:relative;background:#000;
  }
  .video-ratio{
    position:relative !important;
    width:100% !important;
    padding-bottom:56.25% !important;
    height:0 !important;
    flex:none !important;
    overflow:hidden;
  }
  .video-ratio video{
    position:absolute !important;
    inset:0;width:100% !important;height:100% !important;
    object-fit:contain;
  }
  .audio-zone{
    flex:none !important;
    min-height:90px;padding:12px;
  }
  .ch-side{display:none !important}
  .pbar{padding:4px 10px;flex-shrink:0}
  .pn{font-size:10px}
  .pbt{width:22px;height:22px;font-size:10px}
  .live-b,.radio-b{font-size:8px;padding:2px 5px}
  .ad-bottom-mobile{
    flex-shrink:0;height:44px;
    background:var(--bg2);border-top:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-size:10px;color:var(--text2);
  }
  .ad{display:none !important}
  .bottom-zone{flex:1;min-height:0;display:flex !important;flex-direction:column;overflow:hidden}
  .mode-tabs{flex-shrink:0;height:36px}
  .mtab{font-size:12px;padding:7px}
  .fbar-wrap{flex-shrink:0;padding:5px 10px}
  .chip{padding:3px 9px;font-size:11px}
  .grid-zone{flex:1;min-height:0;overflow-y:auto}
  .grid{
    grid-template-columns:repeat(3,1fr) !important;
    gap:6px;padding:5px 8px 16px;
  }
  .clogo,.cfb{height:58px}
  .cfb{font-size:11px}
  .cname{font-size:11px}
  .ccat{font-size:9px}
  .ch-hd{padding:6px 10px 3px}
  .ch-hd h2{font-size:13px}
  .ch-hd span{font-size:11px}
  .ch-load{padding:8px;font-size:11px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">CIC<span> TV</span></div>
  <div class="sw">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Buscar canal o radio..." oninput="doSearch()">
  </div>
  <div class="hbts">
    <!-- ⭐ botón header: muestra TODOS los favoritos en el grid/lista -->
    <button class="hbt" onclick="showFavs()" title="Ver mis favoritos">⭐</button>
    <button class="hbt on" id="hbt-tv" onclick="setMode('tv')">📺 TV <span id="cnt-tv-hdr">0</span></button>
    <button class="hbt" id="hbt-radio" onclick="setMode('radio')">📻 Radio <span id="cnt-radio-hdr">0</span></button>
    <button class="hbt" onclick="refreshAll()">↻</button>
  </div>
</header>

<div class="body">

<!-- SIDEBAR -->
<aside>
  <div class="sl">Modo</div>

<main>

  <!-- BARRA RECOMENDACIONES: FutbolLibreTV + preferencias usuario -->
  <div id="rec-bar" style="flex-shrink:0;min-height:35px;height:35px;max-height:35px;background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;box-sizing:border-box;display:flex;align-items:center;padding:0;position:relative;">
    <!-- Botón anterior -->
    <button id="rec-prev" onclick="recPrev()" style="flex-shrink:0;background:rgba(230,63,110,0.15);border:none;color:#e63f6e;width:22px;height:35px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:2;">&#9664;</button>
    <!-- Ventana del ticker -->
    <div style="flex:1;overflow:hidden;position:relative;height:35px;">
      <div id="rec-track" style="display:flex;align-items:center;height:35px;gap:0;position:absolute;left:0;top:0;transition:transform 0.4s ease;white-space:nowrap;"></div>
    </div>
    <!-- Botón siguiente -->
    <button id="rec-next" onclick="recNext()" style="flex-shrink:0;background:rgba(230,63,110,0.15);border:none;color:#e63f6e;width:22px;height:35px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:2;">&#9654;</button>
  </div>

  <!-- PLAYER ZONE -->
  <div class="player-zone">

    <!-- PLAYER -->
    <div class="player-col">
      <div class="video-ratio" id="vr">
        <video id="vp" playsinline webkit-playsinline preload="none" controls></video>
        <div class="pp" id="pp"><div class="bi">📺</div><p>Selecciona un canal</p></div>
        <div class="ld" id="ld"><div class="sp"></div></div>
        <div class="er" id="er">
          <strong>⚠️ Canal no disponible</strong>
          <p>Offline o bloqueado.</p>
          <div class="ebtns">
            <button class="skip" onclick="prevCh()">◀ Anterior</button>
            <button class="retry" onclick="retry()">↺ Reintentar</button>
            <button class="skip" onclick="nextCh()">▶ Siguiente</button>
          </div>
        </div>
      </div>

      <div class="audio-zone" id="audioZone">
        <div class="aicon">📻</div>
        <div class="aname" id="aname">Selecciona una radio</div>
        <div class="acat" id="acat">—</div>
        <audio id="ap" controls></audio>
      </div>

      <div class="pbar">
        <span class="live-b" id="liveBadge">EN VIVO</span>
        <span class="pn" id="pname">—</span>
        <div class="pbts">
          <!-- botón fav en barra inferior también (redundante pero útil) -->
          <button class="pbt" id="playerFavBtn" onclick="togglePlayerFav()" title="Favorito">☆</button>
          <button class="pbt" id="pinBtn" onclick="togglePin()" title="Fijar">📌</button>
          <button class="pbt" id="fsBtn" onclick="goFS()" title="Pantalla completa">⛶</button>
        </div>
      </div>
      <button class="fs-exit" id="fsExit" onclick="exitFS()">✕ Salir</button>
    </div>

  </div><!-- /player-zone -->

  <!-- PUBLICIDAD DESKTOP — siempre visible debajo del player -->
  <div id="ad-desktop" style="flex-shrink:0;height:50px;min-height:50px;max-height:50px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;box-sizing:border-box;">
    <ins class="adsbygoogle" style="display:block;width:100%;height:50px"
      data-ad-client="ca-pub-6387207876125603" data-ad-slot="auto"
      data-ad-format="horizontal" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <div class="ad-bottom-mobile">
    <ins class="adsbygoogle" style="display:block;width:100%;height:44px"

    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

    <div class="mode-tabs">

      <button class="mtab rtab" id="tab-radio" onclick="setMode('radio')">📻 Radio</button>
    </div>
    <div class="fbar-wrap">
      <div class="fbar" id="fbar">

      </div>
    </div>
    <div class="grid-zone">

      </div>

          data-ad-format="horizontal" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
    </div>
  </div>

</main>

// AUTOPLAY AL INICIAR + MARCA EN LISTA LATERAL
// Espera a window.load para que Hls.js esté disponible
// ═══════════════════════════════════════════════
function autoplayLast() {
  try {
    var last = JSON.parse(localStorage.getItem('cicLastChannel'));
    if (!last || !last.url) return;

    // Mostrar nombre y estado de carga inmediatamente
    curCh      = last;
    sideActive = last;
    g('pname').textContent = last.name;
    g('pp').classList.add('hide');
    g('ld').classList.add('show');
    updatePlayerFavBtn();

    if (last.type === 'radio') {
      setMode('radio');
      g('aname').textContent = last.name;
      var a = g('ap');
      a.src = last.url;
      a.play().catch(function(){});
      g('ld').classList.remove('show');
      showToast('📻 Retomando: ' + last.name);
    } else {
      var v = g('vp');
      if (hlsObj) { hlsObj.destroy(); hlsObj = null; }
      v.src = ''; v.load();

      if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        hlsObj = new Hls({enableWorker:true, lowLatencyMode:true, startLevel:-1});
        hlsObj.loadSource(last.url);
        hlsObj.attachMedia(v);
        hlsObj.on(Hls.Events.MANIFEST_PARSED, function() {
          g('ld').classList.remove('show');
          v.play().catch(function(){ g('ld').classList.remove('show'); });
          showToast('▶ ' + last.name);
        });
        hlsObj.on(Hls.Events.ERROR, function(ev, d) {
          if (d.fatal) { g('ld').classList.remove('show'); g('er').classList.add('show'); }
        });
      } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
        v.src = last.url; v.load();
        v.play().catch(function(){});
        g('ld').classList.remove('show');
        showToast('▶ ' + last.name);
      } else {
        g('ld').classList.remove('show');
        g('er').classList.add('show');
      }
    }

    // Marcar en lista lateral con delay para que el DOM esté pintado
    setTimeout(function() { markSideActive(last); }, 400);

  } catch(e) { console.warn('autoplayLast:', e); }
}

// Ejecutar tras window load para asegurar que Hls.js está disponible
window.addEventListener('load', function() {
  autoplayLast();
});

// FUNCIÓN CENTRAL: marcar canal activo en lista lateral
// Elimina clases previas, aplica active, y hace scroll al elemento
// ════════════════════════════════════
function markSideActive(ch) {
  if (!ch) return;
  // Quitar cualquier marca previa
  document.querySelectorAll('.side-item').forEach(function(el) {
    el.classList.remove('active', 'ractive');
  });
  // Buscar el elemento en la lista lateral
  var el = g('si-' + ch.id);
  if (el) {
    el.classList.add(ch.type === 'radio' ? 'ractive' : 'active');
    // Scroll suave hacia el canal activo
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    // El canal puede no estar visible porque hay filtros activos —
    // resetear filtros de la lista lateral para que aparezca
    sideCatFilter     = 'all';
    sideCountryFilter = 'all';
    // Actualizar chips de países a "Todos"
    document.querySelectorAll('.sc-chip').forEach(function(b){ b.classList.remove('active'); });
    var allChip = document.querySelector('.sc-chip');
    if (allChip) allChip.classList.add('active');
    renderSideList();
    // Intentar scroll de nuevo tras renderizar
    setTimeout(function() {
      var el2 = g('si-' + ch.id);
      if (el2) {
        el2.classList.add(ch.type === 'radio' ? 'ractive' : 'active');
        el2.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 200);
  }
}

function isSlowDevice() {
  var nav = navigator;
  var slowCPU = nav.hardwareConcurrency && nav.hardwareConcurrency <= 2;
  var slowRAM = nav.deviceMemory && nav.deviceMemory <= 2;
  var isTVBox = /TV|Android.*Box|AFTM|AFTT|FireTV|Chromecast/i.test(nav.userAgent);
  return slowCPU || slowRAM || isTVBox;
}

function showToast(msg) {
  var t = g('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

async function loadCountries() {
  const proxies = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
    'https://proxy.cors.sh/',
    'https://thingproxy.freeboard.io/fetch/',
  ];

  async function fetchM3U(url) {
    try {
      const r = await fetch(url, {signal: AbortSignal.timeout(5000)});
      if (r.ok) return await r.text();
    } catch(e) {}
    for (const px of proxies) {
      try {
        const r = await fetch(px + encodeURIComponent(url), {signal: AbortSignal.timeout(8000)});
        if (r.ok) return await r.text();
      } catch(e) { continue; }
    }
    return null;
  }

  await Promise.allSettled(Object.entries(COUNTRY_URLS).map(async ([code, slug]) => {
    const txt = await fetchM3U(`https://iptv-org.github.io/iptv/countries/${slug}.m3u`);
    if (!txt) return;
    const parsed = parseM3U(txt, code, 'tv');
    const newCh  = parsed.filter(ch => !allTV.find(x => x.url === ch.url));
    if (newCh.length) {
      allTV = [...allTV, ...newCh];
      updateAll();
      if (curMode === 'tv') { applyFilter(); renderSideList(); }
      // Si hay canal activo, re-marcarlo tras re-renderizar la lista
      if (sideActive) setTimeout(function(){ markSideActive(sideActive); }, 400);
    }
  }));

  const txtSpa = await fetchM3U('https://iptv-org.github.io/iptv/languages/spa.m3u');
  if (txtSpa) {
    const parsed = parseM3U(txtSpa, 'INT', 'tv');
    const newCh  = parsed.filter(ch => !allTV.find(x => x.url === ch.url));
    if (newCh.length) {
      allTV = [...allTV, ...newCh];
      updateAll();
      if (curMode === 'tv') { applyFilter(); renderSideList(); }
      if (sideActive) setTimeout(function(){ markSideActive(sideActive); }, 400);
    }
  }

  g('chload').classList.remove('show');
  showToast('✓ ' + allTV.length + ' canales · ' + allRadio.length + ' radios');
}

function parseM3U(txt, co, type) {
  const lines = txt.split('\n');
  const res = [];
  let cur = {};
  for (let l of lines) {
    l = l.trim();
    if (l.startsWith('#EXTINF')) {
      const nM = l.match(/tvg-name="([^"]*)"/);
      const lM = l.match(/tvg-logo="([^"]*)"/);
      const cM = l.match(/group-title="([^"]*)"/);
      cur = {
        name: nM ? nM[1] : l.split(',').pop().trim(),
        logo: lM ? lM[1] : '',
        cat:  CAT_MAP[(cM ? cM[1] : '').toLowerCase()] || 'General',
        co, type,
      };
    } else if (l && !l.startsWith('#') && cur.name) {
      cur.url = l;
      cur.id  = type[0] + Math.random().toString(36).slice(2, 8);
      res.push({...cur});
      cur = {};
    }
  }
  return res;
}

function updateAll() {

  const cats = ['Noticias','Deportes','Entretenimiento','Películas','Series','Infantil','Música','Documentales','Religiosos','Negocios','General'];
  const set  = function(id, v){ var e = g(id); if(e) e.textContent = v; };

  set('cn-tv',         allTV.length);
  set('cn-radio',      allRadio.length);
  set('cnt-tv-hdr',    allTV.length);
  set('cnt-radio-hdr', allRadio.length);
  set('cn-fav',        favs.length);
  set('cn-all',        src.length);
  cats.forEach(function(c){ set('cn-'+c, src.filter(function(ch){ return ch.cat===c; }).length); });

  const countries = [...new Set(src.map(function(c){ return c.co; }).filter(Boolean))].sort();
  const bar = g('fbar');
  if (!bar) return;
  bar.innerHTML = '';
  const ab = mkChip('🌐 Todos', curCountry === 'all');

  countries.forEach(function(co) {
    const b = mkChip((CFLAGS[co]||'🏳️')+' '+(CNAMES[co]||co), curCountry === co);
    b.onclick = function(){ setCountry(co, b); };
    bar.appendChild(b);
  });
}

           (CNAMES[c.co]||'').toLowerCase().includes(curSearch);
  });

  g('stitle').textContent = curCat === 'all'

// ════════════════════════════════════
function renderGrid() {
  const grid = g('grid');
  const isR  = curMode === 'radio';
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">📭 Sin resultados</div>';
    return;
  }
  const MAX = isSlowDevice() ? 50 : 300;
  grid.innerHTML = filtered.slice(0, MAX).map(function(ch) {
    const isFav  = favs.includes(ch.id);
    const isPlay = gridActive && gridActive.id === ch.id;
    const pc     = isPlay ? (isR ? ' rplaying' : ' playing') : '';
    const dc     = isR ? ' rd' : '';
    const fc     = isR ? ' rfb' : '';
    const fb     = isR ? '📻' : ch.name.slice(0,3).toUpperCase();
    // Logo: si falla la imagen, reemplazar con fallback via función global
    const logoHtml = ch.logo
      ? '<img class="clogo" src="'+ch.logo+'" alt="'+ch.name+'" loading="lazy" decoding="async" onerror="imgFallback(this,\''+fc+'\',\''+fb+'\')">'
      : '<div class="cfb'+fc+'">'+fb+'</div>';
    return '<div class="card'+pc+'" onclick="playFromGrid(\''+ch.id+'\')" id="cd-'+ch.id+'">'
      + logoHtml
      + '<div class="ldot'+dc+'"></div>'
      + '<div class="cinfo"><div class="cname" title="'+ch.name+'">'+ch.name+'</div>'
      + '<div class="ccat">'+ch.cat+(ch.co?' &middot; '+(CFLAGS[ch.co]||'')+ch.co:'')+'</div></div>'
      + '<button class="favbtn'+(isFav?' on':'')+'" onclick="toggleFav(event,\''+ch.id+'\')">'+( isFav?'⭐':'☆')+'</button>'
      + '</div>';
  }).join('');
  if (filtered.length > MAX)
    grid.innerHTML += '<div style="grid-column:1/-1;text-align:center;padding:8px;color:var(--text2);font-size:10px">Mostrando '+MAX+' de '+filtered.length+' · Usa la búsqueda para filtrar</div>';
}

function renderSideList() {
  var isR = curMode === 'radio';
  var src = (isR ? allRadio : allTV).slice();
  if (sideCatFilter !== 'all')     src = src.filter(function(ch){ return ch.cat === sideCatFilter; });
  var base = isR ? allRadio : allTV;
  var forPaises = sideCatFilter !== 'all'
    ? base.filter(function(ch){ return ch.cat === sideCatFilter; })
    : base;
  updateSideCountriesBar(forPaises);
  if (sideCountryFilter !== 'all') src = src.filter(function(ch){ return ch.co === sideCountryFilter; });
  renderSideFromList(src);
}

// Renderiza la lista lateral desde un array dado
function renderSideFromList(src) {
  var list = g('chSideList');
  var isR  = curMode === 'radio';
  g('sideCount').textContent = src.length + (isR ? ' radios' : ' canales');

  if (!src.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2);font-size:12px">Sin canales</div>';
    return;
  }

  // Si hay canal activo y está en el array pero fuera de los primeros 300,
  // lo ponemos al principio para que siempre sea visible
  var srcOrdered = src.slice();
  if (sideActive) {
    var activeIdx = srcOrdered.findIndex(function(c){ return c.id === sideActive.id; });
    if (activeIdx > 299) {
      var activeItem = srcOrdered.splice(activeIdx, 1)[0];
      srcOrdered.unshift(activeItem);
    }
  }

  var html = '';
  var max  = Math.min(srcOrdered.length, 300);
  // Reasignar src a la versión ordenada
  src = srcOrdered;
  for (var i = 0; i < max; i++) {
    var ch     = src[i];
    var isPlay = sideActive && sideActive.id === ch.id;
    var isFav  = favs.includes(ch.id);
    var ac     = isPlay ? (ch.type === 'radio' ? ' ractive' : ' active') : '';
    var fc     = ch.type === 'radio' ? ' rfb' : '';
    var flag   = ch.co ? ' &middot; '+(CFLAGS[ch.co]||'')+ch.co : '';
    var logo   = ch.logo
      ? '<img class="side-logo" src="'+ch.logo+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
      : '<div class="side-fb'+fc+'">'+(ch.type==='radio'?'📻':ch.name.slice(0,2).toUpperCase())+'</div>';
    var fav = '<button class="side-fav'+(isFav?' on':'')+'" onclick="toggleSideFav(event,\''+ch.id+'\')">'+(isFav?'⭐':'☆')+'</button>';
    html += '<div class="side-item'+ac+'" onclick="playFromSide(\''+ch.id+'\')" id="si-'+ch.id+'">'
          + logo
          + '<div class="side-info"><div class="side-name">'+ch.name+'</div>'
          + '<div class="side-cat">'+ch.cat+flag+'</div></div>'
          + fav + '</div>';
  }
  list.innerHTML = html;
  updateSidePos();

  // ══ Scroll automático al canal activo después de renderizar ══
  if (sideActive) {
    setTimeout(function() {
      var el = g('si-' + sideActive.id);
      if (el) {
        el.classList.add(sideActive.type === 'radio' ? 'ractive' : 'active');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 80);
  }
}

// Clic en GRID
function playFromGrid(id) {
  const src = curMode === 'tv' ? allTV : allRadio;
  const ch  = src.find(function(c){ return c.id === id; });
  if (!ch) return;
  gridActive = ch; curCh = ch; sideActive = ch;
  curIdx = filtered.findIndex(function(c){ return c.id === id; });

  document.querySelectorAll('.card').forEach(function(c){ c.classList.remove('playing','rplaying'); });
  var cd = g('cd-'+id);
  if (cd) cd.classList.add(ch.type==='radio'?'rplaying':'playing');

  g('pname').textContent = ch.name;
  updatePlayerFavBtn();
  localStorage.setItem('cicLastChannel', JSON.stringify({id:ch.id,type:ch.type,name:ch.name,url:ch.url,cat:ch.cat,co:ch.co,logo:ch.logo}));

  // Marcar en lista lateral y hacer scroll
  markSideActive(ch);

  ch.type === 'radio' ? playRadio(ch) : playVideo(ch);
}

// Clic en LISTA LATERAL
function playFromSide(id) {
  const allSrc = curMode === 'tv' ? allTV : allRadio;
  const ch     = allSrc.find(function(c){ return c.id === id; });
  if (!ch) return;
  sideActive = ch; curCh = ch; gridActive = ch;

  // Marcar en lista lateral
  document.querySelectorAll('.side-item').forEach(function(c){ c.classList.remove('active','ractive'); });
  var si = g('si-'+id);
  if (si) { si.classList.add(ch.type==='radio'?'ractive':'active'); si.scrollIntoView({behavior:'smooth',block:'nearest'}); }

  g('pname').textContent = ch.name;
  updatePlayerFavBtn();
  localStorage.setItem('cicLastChannel', JSON.stringify({id:ch.id,type:ch.type,name:ch.name,url:ch.url,cat:ch.cat,co:ch.co,logo:ch.logo}));
  // Registrar vista para recomendaciones de frecuentes
  if (typeof registrarVistaCanal === 'function') registrarVistaCanal(ch);

  ch.type === 'radio' ? playRadio(ch) : playVideo(ch);
}

// Filtro país lista lateral
function setSideCountry(co, btn) {
  sideCountryFilter = co;
  // Solo actualizar chips de la barra lateral (no los del grid principal)
  var bar = g('sideCountriesBar');
  if (bar) bar.querySelectorAll('.sc-chip').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  renderSideList();
  if (sideActive) setTimeout(function(){ markSideActive(sideActive); }, 150);
}

function sideScroll(delta) {
  var list = g('chSideList');
  list.scrollTop += delta;
  updateSidePos();
}

function updateSideCountriesBar(src) {
  var bar = g('sideCountriesBar');
  if (!bar) return;
  var countries = [...new Set(src.map(function(c){ return c.co; }).filter(Boolean))].sort();
  // Construir HTML directamente, más simple y sin problemas de closure
  var html = '<button class="sc-chip'+(sideCountryFilter==='all'?' active':'')+'" data-co="all">🌐 Todos</button>';
  countries.slice(0, 30).forEach(function(co) {
    html += '<button class="sc-chip'+(sideCountryFilter===co?' active':'')+'" data-co="'+co+'">'+(CFLAGS[co]||'🏳️')+' '+(CNAMES[co]||co)+'</button>';
  });
  bar.innerHTML = html;
  // Event delegation: un solo listener persistente (se reasigna cada vez pero es correcto)
  bar.onclick = function(e) {
    var btn = e.target.closest('[data-co]');
    if (!btn) return;
    var co = btn.dataset.co;
    sideCountryFilter = co;
    bar.querySelectorAll('[data-co]').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    renderSideList();
    if (sideActive) setTimeout(function(){ markSideActive(sideActive); }, 150);
  };
}

function updateSidePos() {
  var list  = g('chSideList');
  var items = list.querySelectorAll('.side-item');
  var total = items.length;
  if (!total) return;
  var itemH = 56;
  var idx   = Math.round(list.scrollTop / itemH) + 1;
  g('sidePos').textContent = Math.min(idx, total) + '/' + total;
}

document.getElementById('chSideList').addEventListener('scroll', updateSidePos);

// ════════════════════════════════════
// PLAYER
// ════════════════════════════════════
function playVideo(ch) {
  g('pp').classList.add('hide');
  g('er').classList.remove('show');
  g('ld').classList.add('show');
  clearTimeout(errTimer);
  errTimer = setTimeout(function(){ if (g('ld').classList.contains('show')) showErr(); }, 15000);

  var v = g('vp');
  if (hlsObj) { hlsObj.destroy(); hlsObj = null; }
  v.src = ''; v.load();

  if (typeof Hls !== 'undefined' && Hls.isSupported()) {
    hlsObj = new Hls({enableWorker:true, lowLatencyMode:true, startLevel:-1});
    hlsObj.loadSource(ch.url);
    hlsObj.attachMedia(v);
    hlsObj.on(Hls.Events.MANIFEST_PARSED, function() {
      clearTimeout(errTimer);
      g('ld').classList.remove('show');
      v.play().catch(function(){});
    });
    hlsObj.on(Hls.Events.ERROR, function(_, d){ if (d.fatal) tryNative(v, ch.url); });
  } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
    tryNative(v, ch.url);
  } else {
    tryNative(v, ch.url);
  }
}

function tryNative(v, url) {
  clearTimeout(errTimer);
  g('ld').classList.add('show');
  v.src = url; v.load();
  v.play()
    .then(function(){ g('ld').classList.remove('show'); })
    .catch(function(){ g('ld').classList.remove('show'); });
  errTimer = setTimeout(function(){ if (v.readyState < 2) showErr(); }, 10000);
}

function playRadio(ch) {
  g('aname').textContent = ch.name;
  g('acat').textContent  = ch.cat + (ch.co ? ' · '+(CNAMES[ch.co]||ch.co) : '');
  var a = g('ap');
  a.src = ch.url;
  a.play().catch(function(){});
  showToast('📻 ' + ch.name);
}

var vp = g('vp');
vp.addEventListener('canplay',  function(){ clearTimeout(errTimer); g('ld').classList.remove('show'); });
vp.addEventListener('playing',  function(){ clearTimeout(errTimer); g('ld').classList.remove('show'); });
vp.addEventListener('error',    function(){ showErr(); });

function showErr() {
  clearTimeout(errTimer);
  g('ld').classList.remove('show');
  g('er').classList.add('show');
}

function retry() {
  if (!curCh) return;
  g('er').classList.remove('show');
  curCh.type === 'radio' ? playRadio(curCh) : playVideo(curCh);
}

function nextCh() {
  const allSrc = curMode === 'tv' ? allTV : allRadio;
  if (!allSrc.length) return;
  const idx  = curCh ? allSrc.findIndex(function(c){ return c.id === curCh.id; }) : -1;
  const next = allSrc[(idx + 1) % allSrc.length];
  playFromSide(next.id);
}

function prevCh() {
  const allSrc = curMode === 'tv' ? allTV : allRadio;
  if (!allSrc.length) return;
  const idx  = curCh ? allSrc.findIndex(function(c){ return c.id === curCh.id; }) : 0;
  const prev = allSrc[idx <= 0 ? allSrc.length - 1 : idx - 1];
  playFromSide(prev.id);
}

function togglePin() {
  isPinned = !isPinned;
  var pz  = document.querySelector('.player-zone');
  var btn = g('pinBtn');
  btn.classList.toggle('pin-on', isPinned);
  if (isPinned) {
    pz.style.position = 'sticky'; pz.style.top = '0'; pz.style.zIndex = '50';
    showToast('📌 Reproductor fijado');
  } else {
    pz.style.position = ''; pz.style.top = ''; pz.style.zIndex = '';
    showToast('Reproductor libre');
  }
}

function goFS() {
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    exitFS();
  } else {
    var target = document.querySelector('.player-col');
    (target.requestFullscreen || target.webkitRequestFullscreen).call(target);
    document.body.classList.add('is-fullscreen');
    g('fsBtn') && (g('fsBtn').textContent = '⊡');
  }
}
function exitFS() {
  (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  document.body.classList.remove('is-fullscreen');
  g('fsBtn') && (g('fsBtn').textContent = '⛶');
}
document.addEventListener('fullscreenchange', function(){
  if (!document.fullscreenElement) { document.body.classList.remove('is-fullscreen'); g('fsBtn') && (g('fsBtn').textContent='⛶'); }
});
document.addEventListener('webkitfullscreenchange', function(){
  if (!document.webkitFullscreenElement) { document.body.classList.remove('is-fullscreen'); g('fsBtn') && (g('fsBtn').textContent='⛶'); }
});

// ════════════════════════════════════

// ── MEJORA 1: Actualizar AMBOS botones favoritos (barra + flotante) ──
function updatePlayerFavBtn() {
  if (!curCh) return;
  var isFav = favs.includes(curCh.id);

  // Botón en barra inferior
  var btn = g('playerFavBtn');
  if (btn) {
    btn.textContent = isFav ? '⭐' : '☆';
    btn.title       = isFav ? 'Quitar de favoritos' : 'Agregar a favoritos';
    btn.classList.toggle('fav-on', isFav);
  }
}

// Toggle favorito (llamado por ambos botones)
function togglePlayerFav() {
  if (!curCh) return;
  var id  = curCh.id;
  var idx = favs.indexOf(id);
  if (idx === -1) { favs.push(id); showToast('⭐ ' + curCh.name + ' guardado'); }
  else            { favs.splice(idx, 1); showToast('Eliminado de favoritos'); }
  localStorage.setItem('cicFavs3', JSON.stringify(favs));
  updateAll();
  updatePlayerFavBtn();
  // Sync botones en lista lateral y grid
  var sb = document.querySelector('#si-'+id+' .side-fav');
  if (sb) { sb.classList.toggle('on', favs.includes(id)); sb.textContent = favs.includes(id)?'⭐':'☆'; }
  var gb = document.querySelector('#cd-'+id+' .favbtn');
  if (gb) { gb.classList.toggle('on', favs.includes(id)); gb.textContent = favs.includes(id)?'⭐':'☆'; }
}

// Favorito desde lista lateral
function toggleSideFav(e, id) {
  e.stopPropagation();
  var i = favs.indexOf(id);
  if (i === -1) { favs.push(id); showToast('⭐ Favorito agregado'); }
  else          { favs.splice(i, 1); showToast('Eliminado de favoritos'); }
  localStorage.setItem('cicFavs3', JSON.stringify(favs));
  updateAll();
  var btn = document.querySelector('#si-'+id+' .side-fav');
  if (btn) { btn.classList.toggle('on', favs.includes(id)); btn.textContent = favs.includes(id)?'⭐':'☆'; }
  var gbtn = document.querySelector('#cd-'+id+' .favbtn');
  if (gbtn) { gbtn.classList.toggle('on', favs.includes(id)); gbtn.textContent = favs.includes(id)?'⭐':'☆'; }
  // Si el canal es el actual, sync botón player
  if (curCh && curCh.id === id) updatePlayerFavBtn();
}

// Favorito desde grid
function toggleFav(e, id) {
  e.stopPropagation();
  var i = favs.indexOf(id);
  if (i === -1) { favs.push(id); showToast('⭐ Guardado'); }
  else          { favs.splice(i, 1); showToast('Eliminado'); }
  localStorage.setItem('cicFavs3', JSON.stringify(favs));
  updateAll();
  var btn = document.querySelector('#cd-'+id+' .favbtn');
  if (btn) { btn.classList.toggle('on', favs.includes(id)); btn.textContent = favs.includes(id)?'⭐':'☆'; }
  if (curCh && curCh.id === id) updatePlayerFavBtn();
}

// Drag scroll barra países lateral
(function(){
  var bar = document.getElementById('sideCountriesBar');
  if (!bar) return;
  var isDown = false, startX, scrollLeft;
  bar.addEventListener('mousedown', function(e){ isDown=true; startX=e.pageX-bar.offsetLeft; scrollLeft=bar.scrollLeft; });
  document.addEventListener('mouseup', function(){ isDown=false; });
  bar.addEventListener('mousemove', function(e){ if(!isDown)return; e.preventDefault(); bar.scrollLeft=scrollLeft-(e.pageX-bar.offsetLeft-startX); });
})();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/CIC-TV/sw.js').catch(function(){});
