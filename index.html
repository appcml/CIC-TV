<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📺 TV Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: #fff;
            transition: all 0.3s ease;
        }

        /* Header Compacto */
        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #ffd700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title h1 {
            font-size: 1.2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-title p {
            font-size: 0.75em;
            opacity: 0.8;
        }

        /* Botones de Modo Micro */
        .accessibility-micro {
            display: flex;
            gap: 4px;
        }

        .btn-micro {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid transparent;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-micro:hover {
            transform: scale(1.1);
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
        }

        .btn-micro.active {
            background: #ffd700;
            color: #000;
            border-color: #fff;
        }

        /* Barra de Control */
        .control-bar {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            backdrop-filter: blur(5px);
        }

        .search-wrapper {
            position: relative;
            width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1em;
            opacity: 0.6;
        }

        .search-input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1em;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.15);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Botones de Acción */
        .action-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-action:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            transform: translateY(-2px);
        }

        .btn-action.active {
            background: #ff6b6b;
            border-color: #ff6b6b;
        }

        /* Filtros de Países - TODOS los países */
        .countries-filter-section {
            background: rgba(0, 0, 0, 0.15);
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        .countries-filter-title {
            font-size: 0.8em;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .countries-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: #ffd700 transparent;
            padding-bottom: 5px;
        }

        .countries-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .countries-scroll::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 3px;
        }

        .country-chip {
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 18px;
            border-radius: 22px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .country-chip:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
            border-color: #ffd700;
        }

        .country-chip.active {
            background: #ffd700;
            color: #000;
            border-color: #ffd700;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        }

        .country-chip .flag {
            font-size: 1.2em;
        }

        /* Contenedor Principal */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
        }

        /* Reproductor Principal */
        .player-section {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 2px solid rgba(255, 215, 0, 0.3);
            position: relative;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ffd700;
        }

        .video-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .btn-video-control {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 215, 0, 0.5);
            color: #ffd700;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .btn-video-control:hover {
            background: #ffd700;
            color: #000;
            transform: scale(1.1);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
        }

        .video-container video,
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Pantalla Completa */
        .fullscreen .player-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .fullscreen .video-wrapper {
            height: calc(100vh - 100px);
            border-radius: 15px;
        }

        .fullscreen .video-container {
            padding-bottom: 0;
            height: 100%;
        }

        .now-playing {
            margin-top: 10px;
            padding: 10px 15px;
            background: rgba(255, 215, 0, 0.15);
            border-radius: 8px;
            border-left: 3px solid #ffd700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .now-playing h3 {
            color: #ffd700;
            font-size: 0.95em;
            margin: 0;
        }

        .now-playing p {
            font-size: 0.9em;
            margin: 0;
        }

        /* Categorías */
        .categories-section {
            margin-bottom: 20px;
        }

        .categories-title {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .categories-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: #ffd700 transparent;
            padding-bottom: 5px;
        }

        .categories-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .categories-scroll::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 3px;
        }

        .category-chip {
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 18px;
            border-radius: 22px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .category-chip:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
            border-color: #ffd700;
        }

        .category-chip.active {
            background: #ffd700;
            color: #000;
            border-color: #fff;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        }

        .category-chip .icon {
            font-size: 1.1em;
        }

        /* Grid de Canales */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .channel-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
            position: relative;
        }

        .channel-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.15);
        }

        .channel-card.playing {
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .channel-logo {
            width: 100%;
            height: 90px;
            object-fit: contain;
            background: rgba(0,0,0,0.2);
            padding: 8px;
        }

        .channel-info {
            padding: 10px;
            text-align: center;
        }

        .channel-name {
            font-weight: bold;
            font-size: 0.85em;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-meta {
            font-size: 0.7em;
            opacity: 0.8;
            color: #ffd700;
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5em;
            opacity: 0;
            transition: opacity 0.3s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .channel-card:hover .play-icon {
            opacity: 1;
        }

        /* Modo Niños */
        body.kids-mode {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
        }

        body.kids-mode .header {
            background: rgba(255, 107, 107, 0.3);
            border-color: #fff;
        }

        body.kids-mode .channel-card {
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
        }

        /* Modo Adulto Mayor */
        body.senior-mode {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            font-size: 1.15em;
        }

        body.senior-mode .channel-card {
            font-size: 1.1em;
        }

        body.senior-mode .channel-logo {
            height: 110px;
        }

        /* Resultados */
        .results-header {
            background: rgba(255, 215, 0, 0.15);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .results-header h2 {
            color: #ffd700;
            font-size: 1em;
            margin: 0;
        }

        .btn-clear {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .btn-clear:hover {
            background: rgba(255, 107, 107, 0.3);
            border-color: #ff6b6b;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
            font-size: 1.2em;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #ffd700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            margin-top: 30px;
            border-top: 2px solid #ffd700;
            font-size: 0.85em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-title h1 {
                font-size: 1em;
            }

            .countries-scroll,
            .categories-scroll {
                gap: 6px;
            }

            .country-chip,
            .category-chip {
                padding: 8px 14px;
                font-size: 0.85em;
            }

            .channels-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 10px;
            }

            .channel-logo {
                height: 80px;
            }
        }

        /* Utilidades */
        .hidden {
            display: none !important;
        }

        .favorite-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .favorite-btn:hover {
            transform: scale(1.2);
        }

        .favorite-btn.active {
            background: #ff4757;
            color: white;
        }

        .source-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 0.6em;
            font-weight: bold;
            z-index: 10;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
            grid-column: 1 / -1;
        }

        .no-results-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-title">
            <h1>📺 TV Online</h1>
            <p>Canales IPTV-Org</p>
        </div>
        
        <div class="accessibility-micro">
            <button class="btn-micro active" onclick="toggleMode('normal')" id="btn-normal" title="Normal">👤</button>
            <button class="btn-micro" onclick="toggleMode('kids')" id="btn-kids" title="Niños">🧒</button>
            <button class="btn-micro" onclick="toggleMode('senior')" id="btn-senior" title="Adulto Mayor">👴</button>
        </div>
    </header>

    <!-- Barra de Control -->
    <div class="control-bar">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar canales..." onkeyup="handleSearch(event)">
        </div>

        <div class="action-row">
            <button class="btn-action" onclick="showFavorites()" id="btn-fav">⭐ Favoritos</button>
            <button class="btn-action" onclick="refreshChannels()" id="btn-refresh">🔄 Actualizar</button>
        </div>
    </div>

    <!-- Filtros de Países - TODOS los países disponibles -->
    <div class="countries-filter-section" id="countries-section">
        <div class="countries-filter-title">🌍 Filtrar por País</div>
        <div class="countries-scroll" id="countries-list">
            <!-- Se genera dinámicamente -->
        </div>
    </div>

    <div class="main-container" id="mainContainer">
        <!-- Reproductor -->
        <div class="player-section" id="playerSection">
            <div class="video-wrapper" id="videoWrapper">
                <div class="video-controls">
                    <button class="btn-video-control" onclick="toggleFullscreen()" title="Pantalla Completa" id="fullscreenBtn">
                        ⛶
                    </button>
                </div>
                <div class="video-container" id="player-container">
                    <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #fff; font-size: 1.2em; text-align: center; padding: 20px;">
                        📺 Selecciona un canal para ver
                    </div>
                </div>
            </div>
            <div class="now-playing" id="now-playing" style="display: none;">
                <div>
                    <h3>📡 Ahora:</h3>
                    <p id="current-channel">-</p>
                </div>
                <button class="btn-action" onclick="closePlayer()" style="background: rgba(255, 107, 107, 0.3);">✕</button>
            </div>
        </div>

        <!-- Categorías -->
        <div class="categories-section" id="categories-section">
            <div class="categories-title">📂 Categorías</div>
            <div class="categories-scroll" id="categories-list">
                <!-- Se genera dinámicamente -->
            </div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Cargando canales...</p>
        </div>

        <!-- Contenido -->
        <div id="content-area">
            <!-- Resultados -->
            <div id="results-section" class="hidden">
                <div class="results-header">
                    <h2 id="results-title">🔍 Resultados</h2>
                    <button class="btn-clear" onclick="clearFilter()">✕ Limpiar</button>
                </div>
                <div class="channels-grid" id="results-grid"></div>
            </div>

            <!-- Contenido por defecto -->
            <div id="default-content">
                <div class="channels-grid" id="channels-grid"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>📺 IPTV-Org | Canales de la comunidad</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // URLs de múltiples países para obtener TODOS los países disponibles
        const COUNTRY_URLS = {
            // Latinoamérica

            // Europa
            'ES': 'https://iptv-org.github.io/iptv/countries/es.m3u', // España
            'FR': 'https://iptv-org.github.io/iptv/countries/fr.m3u', // Francia
            'DE': 'https://iptv-org.github.io/iptv/countries/de.m3u', // Alemania
            'IT': 'https://iptv-org.github.io/iptv/countries/it.m3u', // Italia
            'PT': 'https://iptv-org.github.io/iptv/countries/pt.m3u', // Portugal

            'NL': 'https://iptv-org.github.io/iptv/countries/nl.m3u', // Países Bajos
            'BE': 'https://iptv-org.github.io/iptv/countries/be.m3u', // Bélgica
            'CH': 'https://iptv-org.github.io/iptv/countries/ch.m3u', // Suiza
            'AT': 'https://iptv-org.github.io/iptv/countries/at.m3u', // Austria
            
            // Norteamérica
            'US': 'https://iptv-org.github.io/iptv/countries/us.m3u', // Estados Unidos
            'CA': 'https://iptv-org.github.io/iptv/countries/ca.m3u', // Canadá
            
            // Otros
            'RU': 'https://iptv-org.github.io/iptv/countries/ru.m3u', // Rusia
            'IN': 'https://iptv-org.github.io/iptv/countries/in.m3u', // India
            'JP': 'https://iptv-org.github.io/iptv/countries/jp.m3u', // Japón
            'CN': 'https://iptv-org.github.io/iptv/countries/cn.m3u', // China
            'KR': 'https://iptv-org.github.io/iptv/countries/kr.m3u', // Corea del Sur
            'TR': 'https://iptv-org.github.io/iptv/countries/tr.m3u', // Turquía
        };

        // Estado
        let currentMode = 'normal';
        let currentCategory = 'all';
        let currentCountry = 'all';
        let favorites = JSON.parse(localStorage.getItem('tvFavorites')) || [];
        let iptvChannels = [];
        let allCountries = [];
        let isFullscreen = false;

        // Categorías
        const CATEGORIES = {
            all: { icon: '📋', name: 'Todos' },
            news: { icon: '📰', name: 'Noticias' },
            sports: { icon: '⚽', name: 'Deportes' },
            movies: { icon: '🎬', name: 'Películas' },
            series: { icon: '📺', name: 'Series' },
            kids: { icon: '🧸', name: 'Infantil' },
            music: { icon: '🎵', name: 'Música' },
            documentary: { icon: '📚', name: 'Documentales' },
            entertainment: { icon: '🎭', name: 'Entretenimiento' },
            culture: { icon: '🎨', name: 'Cultura' },
            lifestyle: { icon: '✨', name: 'Estilo de Vida' },
            travel: { icon: '✈️', name: 'Viajes' },
            food: { icon: '🍳', name: 'Gastronomía' },
            religion: { icon: '⛪', name: 'Religión' },
            business: { icon: '💼', name: 'Negocios' }
        };

        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            init();
        });

        async function init() {
            renderCategories();
            await loadAllCountries();
        }

        // Cargar TODOS los países disponibles
        async function loadAllCountries() {
            showLoading(true);
            
            iptvChannels = [];
            const loadedCountries = [];
            
            // Cargar cada país en paralelo
            const loadPromises = Object.entries(COUNTRY_URLS).map(async ([code, url]) => {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Failed');
                    
                    const data = await response.text();
                    const channels = parseM3U(data, code);
                    
                    if (channels.length > 0) {
                        loadedCountries.push({
                            code: code,
                            name: getCountryName(code),
                            flag: getCountryFlag(code),
                            count: channels.length
                        });
                        iptvChannels.push(...channels);
                    }
                } catch (e) {
                    console.log(`No se pudo cargar ${code}:`, e.message);
                }
            });
            
            await Promise.all(loadPromises);
            
            // Ordenar países por cantidad de canales
            allCountries = loadedCountries.sort((a, b) => b.count - a.count);
            
            // Si no se cargó ningún país, usar backup
            if (iptvChannels.length === 0) {
                useBackupChannels();
            } else {
                renderCountriesFilter();
                renderChannels();
            }
            
            showLoading(false);
        }

        function parseM3U(data, countryCode) {
            const channels = [];
            const lines = data.split('\n');
            let current = null;
            
            for (let line of lines) {
                line = line.trim();
                
                if (line.startsWith('#EXTINF:')) {
                    current = {
                        name: extractAttribute(line, 'tvg-name') || line.split(',').pop().trim() || 'Sin nombre',
                        logo: extractAttribute(line, 'tvg-logo') || '',
                        group: extractAttribute(line, 'group-title') || 'General',
                        country: countryCode,
                        url: ''
                    };
                } else if (line.startsWith('http') && current) {
                    current.url = line;
                    if (!current.logo) {
                        current.logo = `https://via.placeholder.com/200x90/333/fff?text=${encodeURIComponent(current.name.charAt(0))}`;
                    }
                    channels.push({...current});
                    current = null;
                }
            }
            
            return channels;
        }

        function extractAttribute(line, attr) {
            const match = line.match(new RegExp(`${attr}="([^"]*)"`, 'i'));
            return match ? match[1] : null;
        }

        // Renderizar filtros de países
        function renderCountriesFilter() {
            const container = document.getElementById('countries-list');
            container.innerHTML = '';
            
            // Botón "Todos"
            const totalChannels = iptvChannels.length;
            const allBtn = document.createElement('button');
            allBtn.className = `country-chip ${currentCountry === 'all' ? 'active' : ''}`;
            allBtn.innerHTML = `<span class="flag">🌍</span> Todos (${totalChannels})`;
            allBtn.onclick = () => selectCountry('all');
            container.appendChild(allBtn);
            
            // Todos los países cargados
            allCountries.forEach(country => {
                const btn = document.createElement('button');
                btn.className = `country-chip ${currentCountry === country.code ? 'active' : ''}`;
                btn.innerHTML = `<span class="flag">${country.flag}</span> ${country.name} (${country.count})`;
                btn.onclick = () => selectCountry(country.code);
                container.appendChild(btn);
            });
        }

        // Renderizar categorías
        function renderCategories() {
            const container = document.getElementById('categories-list');
            container.innerHTML = '';
            
            Object.keys(CATEGORIES).forEach(key => {
                const cat = CATEGORIES[key];
                const btn = document.createElement('button');
                btn.className = `category-chip ${currentCategory === key ? 'active' : ''}`;
                btn.innerHTML = `<span class="icon">${cat.icon}</span> ${cat.name}`;
                btn.onclick = () => selectCategory(key);
                container.appendChild(btn);
            });
        }

        // Seleccionar país
        function selectCountry(code) {
            currentCountry = code;
            currentCategory = 'all';
            
            renderCountriesFilter();
            renderCategories();
            
            if (code === 'all') {
                renderChannels();
            } else {
                const filtered = iptvChannels.filter(ch => ch.country === code);
                const countryName = getCountryName(code);
                showResults(filtered, `🌍 ${countryName}`, `${countryName} (${filtered.length} canales)`);
            }
        }

        // Seleccionar categoría
        function selectCategory(key) {
            currentCategory = key;
            currentCountry = 'all';
            
            renderCategories();
            renderCountriesFilter();
            
            const filtered = categorizeChannels(iptvChannels, key);
            
            if (key === 'all') {
                renderChannels();
            } else {
                const catName = CATEGORIES[key].name;
                showResults(filtered, `📂 ${catName}`, `${catName} (${filtered.length} canales)`);
            }
        }

        function categorizeChannels(channels, category) {
            if (category === 'all') return channels;
            
            return channels.filter(ch => {
                const name = ch.name.toLowerCase();
                const group = ch.group.toLowerCase();
                
                switch(category) {
                    case 'news':
                        return group.includes('news') || group.includes('noticias') || name.includes('news') || name.includes('24h') || name.includes('cnn') || name.includes('bbc');
                    case 'sports':
                        return group.includes('sport') || group.includes('deportes') || name.includes('sport') || name.includes('espn') || name.includes('nba') || name.includes('golf');
                    case 'movies':
                        return group.includes('movie') || group.includes('cine') || name.includes('cinema') || name.includes('hollywood') || name.includes('hbo');
                    case 'series':
                        return group.includes('series') || group.includes('entertainment') || name.includes('series') || name.includes('axn') || name.includes('fox') || name.includes('tnt');
                    case 'kids':
                        return group.includes('kids') || group.includes('infantil') || name.includes('disney') || name.includes('nick') || name.includes('cartoon') || name.includes('baby');
                    case 'music':
                        return group.includes('music') || name.includes('mtv') || name.includes('vh1') || name.includes('kiss') || name.includes('radio');
                    case 'documentary':
                        return group.includes('documentary') || name.includes('national') || name.includes('discovery') || name.includes('history') || name.includes('animal');
                    case 'culture':
                        return group.includes('culture') || name.includes('arte') || name.includes('culture');
                    case 'lifestyle':
                        return group.includes('lifestyle') || name.includes('fashion') || name.includes('style') || name.includes('home');
                    case 'travel':
                        return group.includes('travel') || name.includes('travel') || name.includes('viajes');
                    case 'food':
                        return group.includes('food') || name.includes('cocina') || name.includes('kitchen') || name.includes('gusto');
                    case 'religion':
                        return group.includes('religion') || name.includes('god') || name.includes('church') || name.includes('cristiano');
                    case 'business':
                        return group.includes('business') || name.includes('bloomberg') || name.includes('cnbc') || name.includes('finance');
                    default:
                        return true;
                }
            });
        }

        // Mostrar resultados
        function showResults(channels, title, subtitle) {
            const resultsSection = document.getElementById('results-section');
            const defaultContent = document.getElementById('default-content');
            const grid = document.getElementById('results-grid');
            const titleEl = document.getElementById('results-title');
            
            titleEl.innerHTML = `${subtitle}`;
            
            grid.innerHTML = '';
            
            if (channels.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">📺</div>
                        <p>No se encontraron canales</p>
                    </div>
                `;
            } else {
                channels.forEach((ch, idx) => {
                    grid.appendChild(createChannelCard(ch, idx));
                });
            }
            
            resultsSection.classList.remove('hidden');
            defaultContent.classList.add('hidden');
        }

        // Renderizar canales por defecto
        function renderChannels() {
            const resultsSection = document.getElementById('results-section');
            const defaultContent = document.getElementById('default-content');
            const grid = document.getElementById('channels-grid');
            
            resultsSection.classList.add('hidden');
            defaultContent.classList.remove('hidden');
            
            grid.innerHTML = '';
            
            const channelsToShow = iptvChannels.slice(0, 50);
            
            channelsToShow.forEach((ch, idx) => {
                grid.appendChild(createChannelCard(ch, idx));
            });
            
            if (iptvChannels.length > 50) {
                grid.innerHTML += `
                    <div style="grid-column: 1/-1; text-align: center; padding: 20px; opacity: 0.7;">
                        <p>Mostrando 50 de ${iptvChannels.length} canales. Usa los filtros para ver más.</p>
                    </div>
                `;
            }
        }

        // Crear tarjeta de canal
        function createChannelCard(channel, idx) {
            const card = document.createElement('div');
            card.className = 'channel-card';
            
            const isFav = favorites.some(f => f.url === channel.url);
            const source = getSourceBadge(channel.url);
            
            card.innerHTML = `
                <span class="source-badge">${source}</span>
                <button class="favorite-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, '${escapeHtml(channel.name)}', '${channel.url}', '${channel.logo}')">⭐</button>
                <img src="${channel.logo}" alt="${escapeHtml(channel.name)}" class="channel-logo" onerror="this.src='https://via.placeholder.com/200x90/333/fff?text=${encodeURIComponent(channel.name.charAt(0))}'">
                <div class="play-icon">▶️</div>
                <div class="channel-info">
                    <div class="channel-name">${escapeHtml(channel.name)}</div>
                    <div class="channel-meta">
                        <span>${getCountryFlag(channel.country)} ${channel.country}</span>
                        <span>•</span>
                        <span>${channel.group}</span>
                    </div>
                </div>
            `;
            
            card.onclick = (e) => {
                if (!e.target.classList.contains('favorite-btn')) {
                    playChannel(channel.url, channel.name, card);
                }
            };
            
            return card;
        }

        // Búsqueda
        function handleSearch(e) {
            const term = e.target.value.trim().toLowerCase();
            
            if (term.length === 0) {
                clearFilter();
                return;
            }
            
            if (e.key === 'Enter' || term.length >= 2) {
                const results = iptvChannels.filter(ch => {
                    const name = ch.name.toLowerCase();
                    const country = ch.country.toLowerCase();
                    const group = ch.group.toLowerCase();
                    const countryName = getCountryName(ch.country).toLowerCase();
                    
                    return name.includes(term) || 
                           country.includes(term) || 
                           countryName.includes(term) || 
                           group.includes(term);
                });
                
                showResults(results, '🔍 Búsqueda', `Búsqueda: "${term}" (${results.length} canales)`);
            }
        }

        function clearFilter() {
            document.getElementById('searchInput').value = '';
            currentCountry = 'all';
            currentCategory = 'all';
            
            renderCountriesFilter();
            renderCategories();
            renderChannels();
        }

        // Reproducir
        function playChannel(url, name, card) {
            const container = document.getElementById('player-container');
            const nowPlaying = document.getElementById('now-playing');
            const currentCh = document.getElementById('current-channel');
            
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('playing'));
            card.classList.add('playing');
            
            if (url.includes('.m3u8')) {
                container.innerHTML = `<video id="video-player" controls autoplay style="width: 100%; height: 100%;"></video>`;
                const video = document.getElementById('video-player');
                
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.play();
                }
            } else {
                container.innerHTML = `<iframe src="${url}" allowfullscreen style="width: 100%; height: 100%;"></iframe>`;
            }
            
            nowPlaying.style.display = 'flex';
            currentCh.textContent = name;
            
            document.getElementById('playerSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function closePlayer() {
            document.getElementById('player-container').innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #fff; font-size: 1.2em; text-align: center; padding: 20px;">
                    📺 Selecciona un canal para ver
                </div>
            `;
            document.getElementById('now-playing').style.display = 'none';
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('playing'));
        }

        // Pantalla completa
        function toggleFullscreen() {
            const playerSection = document.getElementById('playerSection');
            const btn = document.getElementById('fullscreenBtn');
            
            if (!isFullscreen) {
                playerSection.classList.add('fullscreen');
                btn.title = 'Salir';
                document.body.style.overflow = 'hidden';
                isFullscreen = true;
            } else {
                playerSection.classList.remove('fullscreen');
                btn.title = 'Pantalla Completa';
                document.body.style.overflow = '';
                isFullscreen = false;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isFullscreen) {
                toggleFullscreen();
            }
        });

        // Favoritos
        function toggleFavorite(e, name, url, logo) {
            e.stopPropagation();
            
            const idx = favorites.findIndex(f => f.url === url);
            if (idx > -1) favorites.splice(idx, 1);
            else favorites.push({ name, url, logo });
            
            localStorage.setItem('tvFavorites', JSON.stringify(favorites));
            e.target.classList.toggle('active');
        }

        function showFavorites() {
            clearFilter();
            document.getElementById('btn-fav').classList.add('active');
            
            if (favorites.length === 0) {
                showResults([], '⭐ Favoritos', 'Mis Favoritos (0 canales)');
                return;
            }
            
            showResults(favorites, '⭐ Favoritos', `Mis Favoritos (${favorites.length} canales)`);
        }

        // Modos
        function toggleMode(mode) {
            document.body.classList.remove('kids-mode', 'senior-mode');
            document.querySelectorAll('.btn-micro').forEach(b => b.classList.remove('active'));
            
            if (mode === 'kids') {
                document.body.classList.add('kids-mode');
                document.getElementById('btn-kids').classList.add('active');
            } else if (mode === 'senior') {
                document.body.classList.add('senior-mode');
                document.getElementById('btn-senior').classList.add('active');
            } else {
                document.getElementById('btn-normal').classList.add('active');
            }
        }

        // Helpers
        function getCountryFlag(code) {
            const flags = {
                'AR': '🇦🇷', 'BO': '🇧🇴', 'BR': '🇧🇷', 'CL': '🇨🇱', 'CO': '🇨🇴',
                'CR': '🇨🇷', 'CU': '🇨🇺', 'DO': '🇩🇴', 'EC': '🇪🇨', 'GT': '🇬🇹',
                'HN': '🇭🇳', 'MX': '🇲🇽', 'NI': '🇳🇮', 'PA': '🇵🇦', 'PY': '🇵🇾',
                'PE': '🇵🇪', 'UY': '🇺🇾', 'VE': '🇻🇪', 'ES': '🇪🇸', 'FR': '🇫🇷',
                'DE': '🇩🇪', 'IT': '🇮🇹', 'PT': '🇵🇹', 'GB': '🇬🇧', 'NL': '🇳🇱',
                'BE': '🇧🇪', 'CH': '🇨🇭', 'AT': '🇦🇹', 'US': '🇺🇸', 'CA': '🇨🇦',
                'RU': '🇷🇺', 'IN': '🇮🇳', 'JP': '🇯🇵', 'CN': '🇨🇳', 'KR': '🇰🇷',
                'TR': '🇹🇷'
            };
            return flags[code] || '🏳️';
        }

        function getCountryName(code) {
            const names = {
                'AR': 'Argentina', 'BO': 'Bolivia', 'BR': 'Brasil', 'CL': 'Chile',
                'CO': 'Colombia', 'CR': 'Costa Rica', 'CU': 'Cuba', 'DO': 'Rep. Dominicana',
                'EC': 'Ecuador', 'GT': 'Guatemala', 'HN': 'Honduras', 'MX': 'México',
                'NI': 'Nicaragua', 'PA': 'Panamá', 'PY': 'Paraguay', 'PE': 'Perú',
                'UY': 'Uruguay', 'VE': 'Venezuela', 'ES': 'España', 'FR': 'Francia',
                'DE': 'Alemania', 'IT': 'Italia', 'PT': 'Portugal', 'GB': 'Reino Unido',
                'NL': 'Países Bajos', 'BE': 'Bélgica', 'CH': 'Suiza', 'AT': 'Austria',
                'US': 'EEUU', 'CA': 'Canadá', 'RU': 'Rusia', 'IN': 'India',
                'JP': 'Japón', 'CN': 'China', 'KR': 'Corea del Sur', 'TR': 'Turquía'
            };
            return names[code] || code;
        }

        function getSourceBadge(url) {
            if (url.includes('rtve')) return 'RTVE';
            if (url.includes('pluto')) return 'Pluto';
            if (url.includes('youtube')) return 'YT';
            return 'IPTV';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function refreshChannels() {
            loadAllCountries();
        }

        function useBackupChannels() {
            iptvChannels = [
                { name: 'La 1', logo: 'https://pbs.twimg.com/profile_images/2008842210414915584/zIp_go25_200x200.jpg', url: 'https://ztnr.rtve.es/ztnr/1688877.m3u8', country: 'ES', group: 'General' },
                { name: 'La 2', logo: 'https://yt3.googleusercontent.com/ytc/AIdro_kqgHWySi5xprs1VFCNCX0IKNT8yXBLZC43JMoB8j0JUto=s200', url: 'https://ztnr.rtve.es/ztnr/1688885.m3u8', country: 'ES', group: 'General' },
                { name: '24h', logo: 'https://pbs.twimg.com/profile_images/1634293543987453954/mb1Rzmso_200x200.jpg', url: 'https://ztnr.rtve.es/ztnr/1694255.m3u8', country: 'ES', group: 'News' }
            ];
            
            allCountries = [
                { code: 'ES', name: 'España', flag: '🇪🇸', count: 3 }
            ];
            
            renderCountriesFilter();
            renderChannels();
        }

        // Init
        toggleMode('normal');
    </script>
</body>
