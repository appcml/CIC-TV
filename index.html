<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CIC TV — Canales en Vivo</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;--accent:#e63f6e;--text:#f0f0f8;--text2:#9090b0;--border:rgba(255,255,255,0.07);--radius:12px;--sidebar:220px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* HEADER */
header{position:sticky;top:0;z-index:100;height:52px;background:rgba(10,10,15,0.98);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 14px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-0.5px;flex-shrink:0}
.logo span{color:var(--accent)}
.sw{flex:1;position:relative}
.sw svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;width:14px;height:14px}
#search{width:100%;padding:8px 11px 8px 34px;background:var(--bg3);border:1px solid var(--border);border-radius:24px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
#search:focus{border-color:rgba(230,63,110,0.5)}
#search::placeholder{color:var(--text2)}
.hbts{display:flex;gap:6px;flex-shrink:0}
.hbt{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .18s;white-space:nowrap}
.hbt:hover{background:var(--bg4);color:var(--text)}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 52px)}

/* SIDEBAR */
aside{width:var(--sidebar);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:10px 8px;position:sticky;top:52px;height:calc(100vh - 52px)}
.sl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);padding:10px 10px 4px}
.cb{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;text-align:left;width:100%;white-space:nowrap}
.cb:hover{background:var(--bg3);color:var(--text)}
.cb.active{background:rgba(230,63,110,0.15);color:var(--accent)}
.cb .ic{font-size:14px;width:18px;text-align:center}
.cb .ct{margin-left:auto;font-size:10px;background:var(--bg4);color:var(--text2);padding:1px 6px;border-radius:8px}
.cb.active .ct{background:rgba(230,63,110,0.2);color:var(--accent)}

/* MAIN */
main{flex:1;overflow-x:hidden;display:flex;flex-direction:column}

/* ═══ PLAYER — usa padding-bottom trick que funciona en Android ═══ */
.player-outer{flex-shrink:0;background:#000;padding:0;position:relative}
.video-ratio{position:relative;width:100%;padding-bottom:56.25%;background:#000;overflow:hidden}
.video-ratio video{position:absolute;top:0;left:0;width:100%;height:100%;border:none;object-fit:contain}
.pp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#000;color:var(--text2);z-index:2}
.pp .bi{font-size:48px;opacity:.2}
.pp p{font-size:14px;opacity:.5}
.pp.hide{display:none}
/* overlay info */
.pbar{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:linear-gradient(transparent,rgba(0,0,0,0.9));display:flex;align-items:center;gap:8px;z-index:3;opacity:0;transition:opacity .2s}
.player-outer:hover .pbar,.pbar.show{opacity:1}
.live{background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px;flex-shrink:0}
.pname{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcb{background:rgba(255,255,255,0.15);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pcb:hover{background:rgba(255,255,255,0.3)}
/* loading */
.ld{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);z-index:4}
.ld.show{display:flex}
.sp{width:32px;height:32px;border-radius:50%;border:3px solid var(--bg4);border-top-color:var(--accent);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* error */
.er{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:rgba(0,0,0,0.9);color:var(--text2);font-size:13px;text-align:center;padding:20px;z-index:4}
.er.show{display:flex}
.er strong{color:var(--text);font-size:14px}
.ebtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.ebtns button{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500}
.retry{background:var(--accent);color:#fff}
.skip{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* FILTROS */
.fbar-wrap{padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg2)}
.fbar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.fbar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 13px;border-radius:16px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* HEADER CANALES */
.ch-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px}
.ch-hd h2{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.ch-hd span{font-size:11px;color:var(--text2)}

/* LOADING CANALES */
.ch-load{text-align:center;padding:30px;color:var(--text2);font-size:13px;display:none}
.ch-load.show{display:block}

/* GRID */
.grid{padding:0 10px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .18s;position:relative}
.card:hover{border-color:rgba(230,63,110,0.4);transform:translateY(-2px)}
.card:active{transform:scale(0.97)}
.card.playing{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.clogo{width:100%;height:80px;object-fit:contain;background:var(--bg3);padding:6px;display:block}
.cfb{width:100%;height:80px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text2)}
.ldot{position:absolute;top:4px;left:4px;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.cinfo{padding:6px 8px}
.cname{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ccat{font-size:9px;color:var(--text2);margin-top:1px}
.favbtn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.7);border:none;width:22px;height:22px;border-radius:4px;color:var(--text2);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.card:hover .favbtn,.favbtn.on{opacity:1}
.favbtn.on{color:#ffcc00}

.empty{text-align:center;padding:40px 20px;color:var(--text2);grid-column:1/-1}
.empty .bi{font-size:40px;opacity:.2;margin-bottom:8px}

/* TOAST */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:20px;font-size:12px;z-index:999;transition:transform .25s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* AD */
.ad{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 14px;text-align:center;color:var(--text2);font-size:11px;min-height:52px;display:flex;align-items:center;justify-content:center}

/* MOBILE */
@media(max-width:700px){
  :root{--sidebar:0px}
  aside{display:none}
  .grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
  .hbts{display:none}
}
</style>
</head>

<main>
  <div class="ad"><span>CIC TV · Espacio publicitario</span></div>

  <!-- PLAYER con padding-bottom trick = funciona en Android -->

      <video id="vp" playsinline webkit-playsinline x5-playsinline preload="none" controls></video>

// ══ CARGAR PAÍSES EN PARALELO (más rápido) ══

    for (const px of proxies) {
      try {
        const r = await fetch(px + encodeURIComponent(src), {signal: AbortSignal.timeout(8000)});
        if (!r.ok) continue;
        const txt = await r.text();
        const parsed = parseM3U(txt, code);
        const newCh = parsed.filter(c => !allCh.find(x => x.url === c.url));
        if (newCh.length > 0) {
          allCh = [...allCh, ...newCh];
          updateAll();
          // Actualizar grid si estamos viendo todo
          if (curCat === 'all' && curSearch === '' && curCountry === 'all') renderGrid();
          else if (curCountry === code) renderGrid();
          showToast(`✓ ${COUNTRY_FLAGS[code]||''} ${COUNTRY_NAMES[code]||code}: ${newCh.length} canales`);
        }
        return newCh.length;
      } catch(e) { continue; }
    }
    return 0;
  }

  // Cargar todos los países en paralelo
  const promises = Object.entries(COUNTRY_URLS).map(([code, slug]) => fetchCountry(code, slug));
  const results = await Promise.allSettled(promises);
  const total = results.reduce((sum, r) => sum + (r.value || 0), 0);

  document.getElementById('chload').classList.remove('show');
  if (total > 0) showToast(`✓ ${allCh.length} canales de ${Object.keys(COUNTRY_URLS).length} países`);
  else showToast('Canales base disponibles (' + allCh.length + ')');
}

function parseM3U(txt, co) {
  const lines = txt.split('\n');
  const res = [];
  let cur = {};
  for (let l of lines) {
    l = l.trim();
    if (l.startsWith('#EXTINF')) {
      cur = {};
      cur.name = (l.match(/tvg-name="([^"]*)"/) || l.match(/,(.+)$/) || ['',''])[1].trim() || 'Canal';
      const lg = l.match(/tvg-logo="([^"]*)"/); cur.logo = lg ? lg[1] : '';
      const ct = l.match(/group-title="([^"]*)"/);
      cur.cat = CAT_MAP[(ct ? ct[1] : '').toLowerCase()] || 'General';
      cur.co = co;
    } else if (l && !l.startsWith('#') && cur.name) {
      cur.url = l;
      cur.id = 'x' + Math.random().toString(36).slice(2,9);
      res.push({...cur}); cur = {};
    }
  }
  return res;
}

// ══ UI ══
function updateAll() {
  const cats = ['Noticias','Deportes','Entretenimiento','Películas','Infantil','Música','Documentales','Religiosos','General'];
  const el = id => document.getElementById(id);
  if(el('cn-all')) el('cn-all').textContent = allCh.length;
  if(el('cn-fav')) el('cn-fav').textContent = favs.length;
  cats.forEach(c => { const e = el('cn-'+c); if(e) e.textContent = allCh.filter(ch=>ch.cat===c).length; });

  // países
  const countries = [...new Set(allCh.map(c=>c.co).filter(Boolean))].sort();
  const bar = el('fbar');
  if (!bar) return;
  bar.innerHTML = '';
  const ab = mkChip('🌐 Todos', curCountry==='all');
  ab.onclick = () => setCountry('all', ab);
  bar.appendChild(ab);
  countries.forEach(co => {
    const flag = COUNTRY_FLAGS[co] || '🏳️';
    const name = COUNTRY_NAMES[co] || co;
    const b = mkChip(flag + ' ' + name, curCountry===co);
    b.onclick = () => setCountry(co, b);
    bar.appendChild(b);
  });
}

function mkChip(text, active) {
  const b = document.createElement('button');
  b.className = 'chip' + (active ? ' active' : '');
  b.textContent = text;
  return b;
}

function setCat(cat, btn) {
  curCat = cat;
  curSearch = '';
  document.getElementById('search').value = '';
  document.querySelectorAll('.cb').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  applyFilter();
}

function setCountry(co, btn) {
  curCountry = co;
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  applyFilter();
}

function doSearch() {
  curSearch = document.getElementById('search').value.toLowerCase();
  applyFilter();
}

function refreshAll() {
  allCh = [...BASE];
  updateAll();
  applyFilter();
  loadCountries();
}

function applyFilter() {
  let list = allCh;
  if (curCat === 'favoritos') list = list.filter(c => favs.includes(c.id));
  else if (curCat !== 'all') list = list.filter(c => c.cat === curCat);
  if (curCountry !== 'all') list = list.filter(c => c.co === curCountry);
  if (curSearch) list = list.filter(c => c.name.toLowerCase().includes(curSearch));
  filtered = list;
  renderGrid();
  const titles = {all:'Todos los canales', favoritos:'⭐ Favoritos'};
  document.getElementById('stitle').textContent = titles[curCat] || (COUNTRY_FLAGS[curCat]||'') + ' ' + (curCat);
  document.getElementById('scnt').textContent = filtered.length + ' canales';
}

function renderGrid() {
  filtered = (() => {
    let list = allCh;
    if (curCat === 'favoritos') list = list.filter(c => favs.includes(c.id));
    else if (curCat !== 'all') list = list.filter(c => c.cat === curCat);
    if (curCountry !== 'all') list = list.filter(c => c.co === curCountry);
    if (curSearch) list = list.filter(c => c.name.toLowerCase().includes(curSearch));
    return list;
  })();

  document.getElementById('stitle').textContent = curCat === 'all' ? 'Todos los canales' : curCat === 'favoritos' ? '⭐ Favoritos' : curCat;
  document.getElementById('scnt').textContent = filtered.length + ' canales';

  const g = document.getElementById('grid');
  if (!filtered.length) {
    g.innerHTML = '<div class="empty"><div class="bi">📭</div><p>Sin canales</p></div>';
    return;
  }

  g.innerHTML = filtered.slice(0, 300).map(ch => {
    const isFav = favs.includes(ch.id);
    const isPlay = curCh && curCh.id === ch.id;
    const flag = COUNTRY_FLAGS[ch.co] || '';
    return `<div class="card${isPlay?' playing':''}" onclick="play('${ch.id}')" id="cd-${ch.id}">
      ${ch.logo
        ? `<img class="clogo" src="${ch.logo}" alt="${ch.name}" loading="lazy" onerror="this.outerHTML='<div class=cfb>${ch.name.slice(0,3).toUpperCase()}</div>'">`
        : `<div class="cfb">${ch.name.slice(0,3).toUpperCase()}</div>`}
      <div class="ldot"></div>
      <div class="cinfo">
        <div class="cname" title="${ch.name}">${ch.name}</div>
        <div class="ccat">${ch.cat}${flag?' · '+flag+ch.co:''}</div>
      </div>
      <button class="favbtn${isFav?' on':''}" onclick="toggleFav(event,'${ch.id}')">${isFav?'⭐':'☆'}</button>
    </div>`;
  }).join('');

  if (filtered.length > 300) {
    g.innerHTML += `<div style="grid-column:1/-1;text-align:center;padding:12px;color:var(--text2);font-size:12px">Mostrando 300 de ${filtered.length} · Usa búsqueda para filtrar</div>`;
  }
}

// ══ PLAYER ══
function play(id) {
  const ch = allCh.find(c => c.id === id);
  if (!ch) return;
  curCh = ch;
  curIdx = filtered.findIndex(c => c.id === id);

  document.getElementById('pp').classList.add('hide');
  document.getElementById('er').classList.remove('show');
  document.getElementById('ld').classList.add('show');
  document.getElementById('pname').textContent = ch.name;

  // Mostrar barra info brevemente
  const pbar = document.getElementById('pbar');
  pbar.classList.add('show');
  setTimeout(() => pbar.classList.remove('show'), 3000);

  document.querySelectorAll('.card').forEach(c => c.classList.remove('playing'));
  const cd = document.getElementById('cd-'+id);
  if (cd) { cd.classList.add('playing'); cd.scrollIntoView({behavior:'smooth',block:'nearest'}); }

  clearTimeout(errTimer);
  errTimer = setTimeout(() => {
    if (document.getElementById('ld').classList.contains('show')) showErr();
  }, 15000);

  const v = document.getElementById('vp');
  if (hlsObj) { hlsObj.destroy(); hlsObj = null; }
  v.src = ''; v.load();

  if (Hls.isSupported()) {
    hlsObj = new Hls({enableWorker:true, lowLatencyMode:true, startLevel:-1});
    hlsObj.loadSource(ch.url);
    hlsObj.attachMedia(v);
    hlsObj.on(Hls.Events.MANIFEST_PARSED, () => {
      clearTimeout(errTimer);
      document.getElementById('ld').classList.remove('show');
      v.play().catch(() => document.getElementById('ld').classList.remove('show'));
    });
    hlsObj.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) tryNative(v, ch.url); });
  } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
    tryNative(v, ch.url);
  } else {
    tryNative(v, ch.url);
  }
}

function tryNative(v, url) {
  clearTimeout(errTimer);
  document.getElementById('ld').classList.add('show');
  v.src = url; v.load();
  v.play().then(() => {
    document.getElementById('ld').classList.remove('show');
  }).catch(() => {
    document.getElementById('ld').classList.remove('show');
  });
  errTimer = setTimeout(() => { if (v.readyState < 2) showErr(); }, 10000);
}

const vp = document.getElementById('vp');
vp.addEventListener('canplay', () => { clearTimeout(errTimer); document.getElementById('ld').classList.remove('show'); });
vp.addEventListener('playing', () => { clearTimeout(errTimer); document.getElementById('ld').classList.remove('show'); });
vp.addEventListener('error', () => showErr());

function showErr() {
  clearTimeout(errTimer);
  document.getElementById('ld').classList.remove('show');
  document.getElementById('er').classList.add('show');
}
function retry() { if (curCh) play(curCh.id); }
function nextCh() {
  if (!filtered.length) return;
  const next = filtered[(curIdx + 1) % filtered.length];
  play(next.id);
}
function goFS() {
  const el = document.getElementById('pw');
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  } else {
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  }
}

// ══ FAVORITOS ══
function toggleFav(e, id) {
  e.stopPropagation();
  const i = favs.indexOf(id);
  if (i === -1) { favs.push(id); showToast('⭐ Favorito agregado'); }
  else { favs.splice(i, 1); showToast('Eliminado de favoritos'); }
  localStorage.setItem('cicFavs', JSON.stringify(favs));
  updateAll();
  const btn = document.querySelector('#cd-'+id+' .favbtn');
  if (btn) { btn.classList.toggle('on', favs.includes(id)); btn.textContent = favs.includes(id)?'⭐':'☆'; }
  if (curCat === 'favoritos') renderGrid();
}

let tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(tt);
  tt = setTimeout(() => t.classList.remove('show'), 2500);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/CIC-TV/sw.js').catch(()=>{});
</script>
