<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CIC TV — Canales en Vivo</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
  --accent:#e63f6e;--accent2:#ff9900;
  --text:#f0f0f8;--text2:#9090b0;
  --border:rgba(255,255,255,0.07);--radius:12px;--sidebar:200px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* HEADER */
header{flex-shrink:0;height:52px;background:rgba(10,10,15,0.98);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 12px;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:-0.5px;flex-shrink:0}
.logo span{color:var(--accent)}
.sw{flex:1;position:relative}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;width:13px;height:13px}
#search{width:100%;padding:7px 10px 7px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:24px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
#search:focus{border-color:rgba(230,63,110,0.5)}
#search::placeholder{color:var(--text2)}
.hbts{margin-left:auto;display:flex;gap:5px;flex-shrink:0}
.hbt{padding:5px 11px;border-radius:16px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.hbt:hover{background:var(--bg4);color:var(--text)}
.hbt.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.hbt.ron{background:var(--accent2);color:#000;border-color:var(--accent2)}

/* BODY LAYOUT */
.body{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
aside{width:var(--sidebar);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);padding:10px 10px 4px;flex-shrink:0}
.cb{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;text-align:left;width:100%;white-space:nowrap;flex-shrink:0}
.cb:hover{background:var(--bg3);color:var(--text)}
.cb.active{background:rgba(230,63,110,0.15);color:var(--accent)}
.cb.ron{background:rgba(255,153,0,0.15);color:var(--accent2)}
.cb .ic{font-size:13px;width:16px;text-align:center}
.cb .ct{margin-left:auto;font-size:10px;background:var(--bg4);color:var(--text2);padding:1px 5px;border-radius:6px;min-width:18px;text-align:center}
.cb.active .ct{background:rgba(230,63,110,0.2);color:var(--accent)}

/* MAIN */
main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ═══════════════════════════════════
   ZONA PLAYER + LISTA LATERAL
   player fijo izq | lista deslizable der
═══════════════════════════════════ */
.player-zone{
  display:flex;flex-shrink:0;
  height:300px; /* altura fija — player + lista al mismo nivel */
  border-bottom:2px solid var(--border);
  background:var(--bg);
}

/* PLAYER */
.player-col{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  background:#000;position:relative;
}
.video-ratio{
  flex:1;position:relative;overflow:hidden;background:#000;
}
.video-ratio video{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:contain;border:none;
}
.audio-zone{
  display:none;flex:1;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;background:var(--bg2);padding:16px;
}
.audio-zone.show{display:flex}
.audio-zone .aicon{font-size:40px}
.audio-zone .aname{font-weight:600;font-size:14px;text-align:center}
.audio-zone .acat{font-size:11px;color:var(--text2)}
.audio-zone audio{width:100%;height:36px;accent-color:var(--accent2);margin-top:8px}

/* placeholder */
.pp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:#000;color:var(--text2);z-index:2}
.pp .bi{font-size:36px;opacity:.15}
.pp p{font-size:11px;opacity:.35}
.pp.hide{display:none}
/* loading */
.ld{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);z-index:4}
.ld.show{display:flex}
.sp{width:26px;height:26px;border-radius:50%;border:3px solid var(--bg4);border-top-color:var(--accent);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* error */
.er{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:rgba(0,0,0,0.9);color:var(--text2);font-size:12px;text-align:center;padding:12px;z-index:4}
.er.show{display:flex}
.er strong{color:var(--text);font-size:13px}
.ebtns{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;justify-content:center}
.ebtns button{padding:5px 12px;border-radius:7px;border:none;cursor:pointer;font-size:11px;font-weight:500}
.retry{background:var(--accent);color:#fff}
.skip{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* BARRA PLAYER */
.pbar{
  flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);
  padding:5px 10px;display:flex;align-items:center;gap:6px;
}
.live-b{background:var(--accent);color:#fff;font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 5px;border-radius:3px;flex-shrink:0}
.radio-b{background:var(--accent2);color:#000;font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 5px;border-radius:3px;flex-shrink:0}
.pn{font-size:11px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbts{display:flex;gap:3px}
.pbt{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:24px;height:24px;border-radius:5px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pbt:hover{background:var(--bg4);color:var(--text)}
.pbt.pin-on{background:rgba(230,63,110,0.2);color:var(--accent);border-color:var(--accent)}

/* ═══════════════════════════════════
   LISTA LATERAL DESLIZABLE
   Misma altura que el player
═══════════════════════════════════ */
.ch-side{
  width:230px;flex-shrink:0;
  background:var(--bg2);border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  position:relative;
}
.ch-side-hd{
  flex-shrink:0;padding:7px 10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.ch-side-hd span{font-family:'Syne',sans-serif;font-weight:700;font-size:12px}
.ch-side-hd small{color:var(--text2);font-size:10px}

/* Flechas de navegación */
.side-nav{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:4px 8px;border-bottom:1px solid var(--border);background:var(--bg3);
}
.side-arrow{
  background:var(--bg4);border:1px solid var(--border);color:var(--text2);
  width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
  user-select:none;
}
.side-arrow:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.side-pos{font-size:10px;color:var(--text2)}

/* Lista deslizable */
.ch-side-list{
  flex:1;overflow-y:auto;overflow-x:hidden;
  scroll-behavior:smooth;
  /* soporte touch */
  -webkit-overflow-scrolling:touch;
}
.side-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;cursor:pointer;
  transition:all .15s;border-bottom:1px solid var(--border);
  position:relative;
}
.side-item:hover{background:var(--bg3)}
.side-item.active{background:rgba(230,63,110,0.12);border-left:2px solid var(--accent)}
.side-item.ractive{background:rgba(255,153,0,0.1);border-left:2px solid var(--accent2)}
.side-logo{
  width:38px;height:38px;border-radius:6px;
  background:var(--bg3);object-fit:contain;padding:3px;flex-shrink:0;
}
.side-fb{
  width:38px;height:38px;border-radius:6px;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--text2);flex-shrink:0;
}
.side-fb.rfb{background:rgba(255,153,0,0.1);color:var(--accent2)}
.side-info{flex:1;min-width:0}
.side-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-cat{font-size:9px;color:var(--text2);margin-top:1px}
.side-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 2s infinite}
.side-dot.rd{background:var(--accent2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ═══ ZONA INFERIOR: TABS + FILTROS + GRID ═══ */
.bottom-zone{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* TABS */
.mode-tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--border)}
.mtab{flex:1;padding:7px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.mtab.active{color:var(--accent);border-bottom-color:var(--accent)}
.mtab.rtab.active{color:var(--accent2);border-bottom-color:var(--accent2)}

/* FILTROS PAÍS */
.fbar-wrap{flex-shrink:0;padding:5px 10px;border-bottom:1px solid var(--border);background:var(--bg2)}
.fbar{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.fbar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:3px 10px;border-radius:14px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* GRID */
.grid-zone{flex:1;overflow-y:auto}
.ch-hd{display:flex;align-items:center;justify-content:space-between;padding:7px 12px 3px;flex-shrink:0}
.ch-hd h2{font-family:'Syne',sans-serif;font-weight:700;font-size:13px}
.ch-hd span{font-size:10px;color:var(--text2)}
.ch-load{text-align:center;padding:12px;color:var(--text2);font-size:11px;display:none}
.ch-load.show{display:block}
.grid{padding:5px 8px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .18s;position:relative}
.card:hover{border-color:rgba(230,63,110,0.4);transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,0.4)}
.card:active{transform:scale(0.97)}
.card.playing{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.card.rplaying{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent2)}
.clogo{width:100%;height:62px;object-fit:contain;background:var(--bg3);padding:5px;display:block}
.cfb{width:100%;height:62px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text2)}
.cfb.rfb{background:rgba(255,153,0,0.08);color:var(--accent2);font-size:18px}
.ldot{position:absolute;top:3px;left:3px;width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
.ldot.rd{background:var(--accent2)}
.cinfo{padding:5px 6px}
.cname{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ccat{font-size:9px;color:var(--text2);margin-top:1px}
.favbtn{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.7);border:none;width:18px;height:18px;border-radius:3px;color:var(--text2);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.card:hover .favbtn,.favbtn.on{opacity:1}
.favbtn.on{color:#ffcc00}
.empty{text-align:center;padding:24px;color:var(--text2);grid-column:1/-1;font-size:12px}

/* TOAST */
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:18px;font-size:12px;z-index:999;transition:transform .25s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* AD */
.ad{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);padding:6px;text-align:center;color:var(--text2);font-size:10px;min-height:44px;display:flex;align-items:center;justify-content:center}

/* MOBILE */
@media(max-width:700px){
  :root{--sidebar:0px}
  aside{display:none}
  .ch-side{width:160px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:5px}
  .player-zone{height:auto;flex-direction:column}
  .ch-side{width:100%;height:160px;flex-direction:row}
  .ch-side-list{flex-direction:row;display:flex;overflow-x:auto;overflow-y:hidden}
  .side-item{flex-direction:column;min-width:80px;border-bottom:none;border-right:1px solid var(--border)}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">CIC<span> TV</span></div>
  <div class="sw">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Buscar canal o radio..." oninput="doSearch()">
  </div>
  <div class="hbts">
    <button class="hbt" onclick="showFavs()">⭐</button>
    <button class="hbt on" id="hbt-tv" onclick="setMode('tv')">📺 TV</button>
    <button class="hbt" id="hbt-radio" onclick="setMode('radio')">📻 Radio</button>
    <button class="hbt" onclick="refreshAll()">↻</button>
  </div>
</header>

<div class="body">

<!-- SIDEBAR -->
<aside>
  <div class="sl">Modo</div>
  <button class="cb active" id="sb-tv" onclick="setMode('tv')"><span class="ic">📺</span>TV<span class="ct" id="cn-tv">0</span></button>
  <button class="cb" id="sb-radio" onclick="setMode('radio')"><span class="ic">📻</span>Radio<span class="ct" id="cn-radio">0</span></button>
  <button class="cb" onclick="showFavs()"><span class="ic">⭐</span>Favoritos<span class="ct" id="cn-fav">0</span></button>
  <div class="sl" id="cat-label">Categorías TV</div>
  <button class="cb active" id="cat-all" onclick="setCat('all',this)"><span class="ic">📋</span>Todos<span class="ct" id="cn-all">0</span></button>
  <button class="cb" onclick="setCat('Noticias',this)"><span class="ic">📰</span>Noticias<span class="ct" id="cn-Noticias">0</span></button>
  <button class="cb" onclick="setCat('Deportes',this)"><span class="ic">⚽</span>Deportes<span class="ct" id="cn-Deportes">0</span></button>
  <button class="cb" onclick="setCat('Entretenimiento',this)"><span class="ic">🎬</span>Entretenimiento<span class="ct" id="cn-Entretenimiento">0</span></button>
  <button class="cb" onclick="setCat('Películas',this)"><span class="ic">🎥</span>Películas<span class="ct" id="cn-Películas">0</span></button>
  <button class="cb" onclick="setCat('Series',this)"><span class="ic">🎞</span>Series<span class="ct" id="cn-Series">0</span></button>
  <button class="cb" onclick="setCat('Infantil',this)"><span class="ic">🧒</span>Infantil<span class="ct" id="cn-Infantil">0</span></button>
  <button class="cb" onclick="setCat('Música',this)"><span class="ic">🎵</span>Música<span class="ct" id="cn-Música">0</span></button>
  <button class="cb" onclick="setCat('Documentales',this)"><span class="ic">🌍</span>Documentales<span class="ct" id="cn-Documentales">0</span></button>
  <button class="cb" onclick="setCat('Religiosos',this)"><span class="ic">🙏</span>Religiosos<span class="ct" id="cn-Religiosos">0</span></button>
  <button class="cb" onclick="setCat('Negocios',this)"><span class="ic">💼</span>Negocios<span class="ct" id="cn-Negocios">0</span></button>
  <button class="cb" onclick="setCat('General',this)"><span class="ic">📡</span>General<span class="ct" id="cn-General">0</span></button>
</aside>

<!-- MAIN -->
<main>

  <!-- ═══ PLAYER ZONE ═══ -->
  <div class="player-zone">

    <!-- PLAYER -->
    <div class="player-col">
      <div class="video-ratio" id="vr">
        <video id="vp" playsinline webkit-playsinline preload="none" controls></video>
        <div class="pp" id="pp"><div class="bi">📺</div><p>Selecciona un canal</p></div>
        <div class="ld" id="ld"><div class="sp"></div></div>
        <div class="er" id="er">
          <strong>⚠️ Canal no disponible</strong>
          <p>Offline o bloqueado.</p>
          <div class="ebtns">
            <button class="skip" onclick="prevCh()">◀ Anterior</button>
            <button class="retry" onclick="retry()">↺ Reintentar</button>
            <button class="skip" onclick="nextCh()">▶ Siguiente</button>
          </div>
        </div>
      </div>
      <div class="audio-zone" id="audioZone">
        <div class="aicon">📻</div>
        <div class="aname" id="aname">Selecciona una radio</div>
        <div class="acat" id="acat">—</div>
        <audio id="ap" controls></audio>
      </div>
      <div class="pbar">
        <span class="live-b" id="liveBadge">EN VIVO</span>
        <span class="pn" id="pname">—</span>
        <div class="pbts">
          <button class="pbt" id="pinBtn" onclick="togglePin()" title="Fijar">📌</button>
          <button class="pbt" onclick="goFS()" title="Pantalla completa">⛶</button>
        </div>
      </div>
    </div>

    <!-- ═══ LISTA LATERAL DESLIZABLE ═══ -->
    <div class="ch-side">
      <div class="ch-side-hd">
        <span>Lista</span>
        <small id="sideCount">0</small>
      </div>
      <!-- Flechas de navegación -->
      <div class="side-nav">
        <button class="side-arrow" onclick="sideScroll(-150)" title="Arriba">▲</button>
        <span class="side-pos" id="sidePos">Desliza</span>
        <button class="side-arrow" onclick="sideScroll(150)" title="Abajo">▼</button>
      </div>
      <!-- Lista deslizable -->
      <div class="ch-side-list" id="chSideList"></div>
    </div>

  </div><!-- /player-zone -->

  <!-- ZONA INFERIOR -->
  <div class="bottom-zone">

    <!-- TABS -->
    <div class="mode-tabs">
      <button class="mtab active" id="tab-tv" onclick="setMode('tv')">📺 TV en Vivo</button>
      <button class="mtab rtab" id="tab-radio" onclick="setMode('radio')">📻 Radio</button>
    </div>

    <!-- FILTROS PAÍS -->
    <div class="fbar-wrap">
      <div class="fbar" id="fbar">
        <button class="chip active" onclick="setCountry('all',this)">🌐 Todos</button>
      </div>
    </div>

    <!-- GRID -->
    <div class="grid-zone">
      <div class="ch-hd">
        <h2 id="stitle">Cargando...</h2>
        <span id="scnt"></span>
      </div>
      <div class="ch-load show" id="chload">⏳ Cargando canales...</div>
      <div class="grid" id="grid"></div>
      <div class="ad"><span>CIC TV · Espacio publicitario</span></div>
    </div>

  </div><!-- /bottom-zone -->

</main>
</div><!-- /body -->

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
<script>
// ════════════════════════════════════
// VARIABLES GLOBALES — todas al inicio
// ════════════════════════════════════
let toastTimer = null;
let errTimer   = null;
let hlsObj     = null;
let curCh      = null;
let curIdx     = -1;
let curMode    = 'tv';
let curCat     = 'all';
let curCountry = 'all';
let curSearch  = '';
let isPinned   = false;
let filtered   = [];
let favs       = JSON.parse(localStorage.getItem('cicFavs3') || '[]');

// ════════════════════════════════════
// CANALES BASE TV

function showToast(msg) {

  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);

// ════════════════════════════════════
// CARGA DE PAÍSES (paralela)
// ════════════════════════════════════
async function loadCountries() {
  const proxies = ['https://api.allorigins.win/raw?url=', 'https://corsproxy.io/?url='];
  await Promise.allSettled(Object.entries(COUNTRY_URLS).map(async ([code, slug]) => {
    const src = `https://iptv-org.github.io/iptv/countries/${slug}.m3u`;
    for (const px of proxies) {
      try {
        const r = await fetch(px + encodeURIComponent(src), {signal: AbortSignal.timeout(8000)});
        if (!r.ok) continue;
        const parsed = parseM3U(await r.text(), code, 'tv');
        const newCh  = parsed.filter(c => !allTV.find(x => x.url === c.url));
        if (newCh.length) {
          allTV = [...allTV, ...newCh];
          updateAll();
          if (curMode === 'tv') { applyFilter(); }
          showToast(`${CFLAGS[code]||''} ${CNAMES[code]||code} +${newCh.length}`);
        }
        break;
      } catch(e) { continue; }
    }
  }));
  g('chload').classList.remove('show');
  showToast(`✓ Total: ${allTV.length} canales TV`);
}

function parseM3U(txt, co, type) {
  const lines = txt.split('\n');
  const res = [];
  let cur = {};
  for (let l of lines) {
    l = l.trim();
    if (l.startsWith('#EXTINF')) {
      const nM = l.match(/tvg-name="([^"]*)"/);
      const lM = l.match(/tvg-logo="([^"]*)"/);
      const cM = l.match(/group-title="([^"]*)"/);
      cur = {
        name: nM ? nM[1] : l.split(',').pop().trim(),
        logo: lM ? lM[1] : '',
        cat:  CAT_MAP[(cM ? cM[1] : '').toLowerCase()] || 'General',
        co, type,
      };
    } else if (l && !l.startsWith('#') && cur.name) {
      cur.url = l;
      cur.id  = type[0] + Math.random().toString(36).slice(2, 8);
      res.push({...cur});
      cur = {};
    }
  }
  return res;
}

function updateAll() {
  const src = curMode === 'tv' ? allTV : allRadio;
  const cats = ['Noticias','Deportes','Entretenimiento','Películas','Series','Infantil','Música','Documentales','Religiosos','Negocios','General'];
  const set = (id, v) => { const e = g(id); if (e) e.textContent = v; };

  set('cn-tv',    allTV.length);
  set('cn-radio', allRadio.length);
  set('cn-fav',   favs.length);
  set('cn-all',   src.length);
  cats.forEach(c => set('cn-' + c, src.filter(ch => ch.cat === c).length));

  // Chips de países
  const countries = [...new Set(src.map(c => c.co).filter(Boolean))].sort();
  const bar = g('fbar');
  if (!bar) return;
  bar.innerHTML = '';
  const ab = mkChip('🌐 Todos', curCountry === 'all');
  ab.onclick = () => setCountry('all', ab);
  bar.appendChild(ab);
  countries.forEach(co => {
    const b = mkChip((CFLAGS[co]||'🏳️') + ' ' + (CNAMES[co]||co), curCountry === co);
    b.onclick = () => setCountry(co, b);
    bar.appendChild(b);
  });
}

function mkChip(text, active) {
  const b = document.createElement('button');
  b.className = 'chip' + (active ? ' active' : '');
  b.textContent = text;
  return b;
}

function applyFilter() {
  const src = curMode === 'tv' ? allTV : allRadio;
  let list = src;
  if (curCat !== 'all') list = list.filter(c => c.cat === curCat);
  if (curCountry !== 'all') list = list.filter(c => c.co === curCountry);
  if (curSearch) list = list.filter(c =>
    c.name.toLowerCase().includes(curSearch) ||
    (CNAMES[c.co]||'').toLowerCase().includes(curSearch)
  );
  filtered = list;
  g('stitle').textContent = curCat === 'all' ? (curMode === 'tv' ? 'Todos los canales' : 'Todas las radios') : curCat;
  g('scnt').textContent   = filtered.length + (curMode === 'tv' ? ' canales' : ' radios');

  renderSideList();

function renderGrid() {
  const grid  = g('grid');
  const isR   = curMode === 'radio';
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">📭 Sin resultados</div>';
    return;
  }
  grid.innerHTML = filtered.slice(0, 300).map(ch => {
    const isFav  = favs.includes(ch.id);

      <div class="cinfo">

      <button class="favbtn${isFav?' on':''}" onclick="toggleFav(event,'${ch.id}')">${isFav?'⭐':'☆'}</button>

function sideScroll(delta) {
  const list = g('chSideList');
  list.scrollTop += delta;
  updateSidePos();
}

function updateSidePos() {
  const list = g('chSideList');
  const total = filtered.length;
  if (!total) return;
  const itemH  = 56;
  const idx    = Math.round(list.scrollTop / itemH) + 1;
  g('sidePos').textContent = `${Math.min(idx, total)}/${total}`;
}

// Actualizar posición al hacer scroll
document.getElementById('chSideList').addEventListener('scroll', updateSidePos);

// PLAYER
// ════════════════════════════════════
function play(id) {
  const src = [...allTV, ...allRadio];
  const ch  = src.find(c => c.id === id);
  if (!ch) return;
  curCh  = ch;
  curIdx = filtered.findIndex(c => c.id === id);

  // Activar modo correcto si es necesario
  if (ch.type !== curMode) setMode(ch.type);

  g('pname').textContent = ch.name;

  // Resaltar en grid y lista
  document.querySelectorAll('.card').forEach(c => c.classList.remove('playing','rplaying'));
  document.querySelectorAll('.side-item').forEach(c => c.classList.remove('active','ractive'));
  const cd = g('cd-' + id);
  const si = g('si-' + id);
  if (cd) { cd.classList.add(ch.type==='radio'?'rplaying':'playing'); cd.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  if (si) { si.classList.add(ch.type==='radio'?'ractive':'active'); si.scrollIntoView({behavior:'smooth',block:'nearest'}); }

  ch.type === 'radio' ? playRadio(ch) : playVideo(ch);
}

function playVideo(ch) {
  g('pp').classList.add('hide');
  g('er').classList.remove('show');
  g('ld').classList.add('show');
  clearTimeout(errTimer);
  errTimer = setTimeout(() => { if (g('ld').classList.contains('show')) showErr(); }, 15000);

  const v = g('vp');
  if (hlsObj) { hlsObj.destroy(); hlsObj = null; }
  v.src = ''; v.load();

  if (Hls.isSupported()) {
    hlsObj = new Hls({enableWorker:true, lowLatencyMode:true, startLevel:-1});
    hlsObj.loadSource(ch.url);
    hlsObj.attachMedia(v);
    hlsObj.on(Hls.Events.MANIFEST_PARSED, () => {
      clearTimeout(errTimer);
      g('ld').classList.remove('show');
      v.play().catch(() => {});
    });
    hlsObj.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) tryNative(v, ch.url); });
  } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
    tryNative(v, ch.url);
  } else {
    tryNative(v, ch.url);
  }
}

function tryNative(v, url) {
  clearTimeout(errTimer);
  g('ld').classList.add('show');
  v.src = url; v.load();
  v.play()
    .then(() => g('ld').classList.remove('show'))
    .catch(() => g('ld').classList.remove('show'));
  errTimer = setTimeout(() => { if (v.readyState < 2) showErr(); }, 10000);
}

function playRadio(ch) {
  g('aname').textContent = ch.name;
  g('acat').textContent  = ch.cat + (ch.co ? ' · ' + (CNAMES[ch.co]||ch.co) : '');
  const a = g('ap');
  a.src = ch.url;
  a.play().catch(() => {});
  showToast('📻 ' + ch.name);
}

const vp = g('vp');
vp.addEventListener('canplay',  () => { clearTimeout(errTimer); g('ld').classList.remove('show'); });
vp.addEventListener('playing',  () => { clearTimeout(errTimer); g('ld').classList.remove('show'); });
vp.addEventListener('error',    () => showErr());

function showErr() {
  clearTimeout(errTimer);
  g('ld').classList.remove('show');
  g('er').classList.add('show');
}
function retry()  { if (curCh) play(curCh.id); }
function nextCh() {
  if (!filtered.length) return;
  play(filtered[(curIdx + 1) % filtered.length].id);
}
function prevCh() {
  if (!filtered.length) return;
  const i = curIdx <= 0 ? filtered.length - 1 : curIdx - 1;
  play(filtered[i].id);
}

  play(filtered[i].id);
}

function togglePin() {
  isPinned = !isPinned;
  const pz = document.querySelector('.player-zone');
  const btn = g('pinBtn');
  btn.classList.toggle('pin-on', isPinned);
  if (isPinned) {
    pz.style.position = 'sticky';
    pz.style.top = '0';
    pz.style.zIndex = '50';
    showToast('📌 Reproductor fijado');
  } else {
    pz.style.position = '';
    pz.style.top = '';
    pz.style.zIndex = '';
    showToast('Reproductor libre');
  }
}

function goFS() {
  const el = g('vr');
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  } else {
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  }
}

function toggleFav(e, id) {
  e.stopPropagation();
  const i = favs.indexOf(id);
  if (i === -1) { favs.push(id); showToast('⭐ Guardado'); }
  else          { favs.splice(i, 1); showToast('Eliminado'); }
  localStorage.setItem('cicFavs3', JSON.stringify(favs));
  updateAll();
  const btn = document.querySelector('#cd-' + id + ' .favbtn');
  if (btn) { btn.classList.toggle('on', favs.includes(id)); btn.textContent = favs.includes(id) ? '⭐' : '☆'; }
}
