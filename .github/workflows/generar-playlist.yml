name: Actualizar Playlist M3U

on:
  schedule:
    - cron: '30 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  generar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar playlist.m3u y radios.json
        run: python3 generar_playlist.py

      - name: Commit
        run: |
          git config --global user.name  'actions-user'
          git config --global user.email 'actions@github.com'
          git add playlist.m3u radios.json
          ENTRADAS=$(grep -c '#EXTINF' playlist.m3u 2>/dev/null || echo 0)
          git diff --staged --quiet || git commit -m "Playlist actualizada [$(date -u '+%Y-%m-%d %H:%M UTC')] - ${ENTRADAS} entradas"
          git push
