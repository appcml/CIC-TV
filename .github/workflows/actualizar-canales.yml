name: Actualizar Canales CIC TV

on:
  schedule:
    # Cada 6 horas: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:  # Ejecución manual desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar actualizador
        run: python actualizar.py
        timeout-minutes: 20

      - name: Verificar canales.json
        run: |
          python3 -c "
          import json
          with open('canales.json') as f:
              d = json.load(f)
          print(f'Total: {d[\"stats\"][\"total\"]}')
          print(f'Vivos: {d[\"stats\"][\"vivos\"]}')
          print(f'Caidos: {d[\"stats\"][\"caidos\"]}')
          print(f'Generado: {d[\"generado\"]}')
          # Verificar que hay canales de fútbol
          deportes = [c for c in d['canales'] if c.get('cat') == 'Deportes']
          print(f'Canales Deportes: {len(deportes)}')
          "

      - name: Commit y push canales.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CIC TV Bot"
          git add canales.json
          git diff --staged --quiet || git commit -m "🤖 Actualizar canales.json [$(date -u '+%Y-%m-%d %H:%M')] UTC - $(python3 -c \"import json; d=json.load(open('canales.json')); print(f'{d[\\\"stats\\\"][\\\"vivos\\\"]} vivos')\")"
          git push
