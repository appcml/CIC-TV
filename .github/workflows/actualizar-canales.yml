name: Actualizar Canales CIC TV

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar actualizador
        run: python actualizar.py
        timeout-minutes: 20

      - name: Verificar canales.json
        run: |
          python3 << 'EOF'
          import json
          with open('canales.json') as f:
              d = json.load(f)
          print(f"Total: {d['stats']['total']}")
          print(f"Vivos: {d['stats']['vivos']}")
          print(f"Caidos: {d['stats']['caidos']}")
          print(f"Generado: {d['generado']}")
          deportes = [c for c in d['canales'] if c.get('cat') == 'Deportes']
          print(f"Canales Deportes: {len(deportes)}")
          EOF

      - name: Commit y push canales.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CIC TV Bot"
          git add canales.json
          FECHA=$(date -u '+%Y-%m-%d %H:%M')
          VIVOS=$(python3 -c "import json; d=json.load(open('canales.json')); print(d['stats']['vivos'])")
          git diff --staged --quiet || git commit -m "Actualizar canales.json [$FECHA UTC] - $VIVOS vivos"
          git push
